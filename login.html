<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" href="favicon.png">
<meta charset="UTF-8">
<title>Login | Painel Operacional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg,#0f2a5c 0%,#1e3a8a 45%,#7f1d1d 75%,#b91c1c 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  width: 100%;
  max-width: 390px;
  background: linear-gradient(180deg, #0b1633, #050b1e);
  border-radius: 16px;
  padding: 28px 26px;
  box-shadow: 0 25px 60px rgba(0,0,0,.45);
  color: #fff;
}
.login-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.logo {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, #dc2626, #1e3a8a);
  display: flex; align-items: center; justify-content: center;
  font-weight: bold;
}
label { font-size: 13px; color: #cbd5f5; display: block; margin-bottom: 6px; }
input {
  width: 100%; padding: 12px;
  border-radius: 10px; border: 1px solid #1e293b;
  background: #020617; color: #fff;
  font-size: 14px; margin-bottom: 14px;
}
button {
  width: 100%; padding: 14px;
  border-radius: 12px; border: none;
  background: linear-gradient(135deg, #1e3a8a, #dc2626);
  color: #fff; font-size: 15px; font-weight: bold;
  cursor: pointer;
}
.error {
  margin-top: 12px; font-size: 13px;
  color: #f87171; display: none; text-align: center;
}
</style>
</head>

<body>

<div class="login-box" id="box">
  <div class="login-header">
    <div class="logo">RB</div>
    <span>Painel Operacional - Logística</span>
  </div>

  <h2>Acesse sua conta</h2>

  <label>Email</label>
  <input type="email" id="email" placeholder="Informe seu email">

  <label>Senha</label>
  <input type="password" id="senha" placeholder="Informe sua senha">

  <button onclick="login()">Entrar</button>

  <div class="error" id="erro">Usuário ou senha inválidos</div>
</div>

<script type="module">

import { auth } from "./components/firebase.js";
import { 
  signInWithEmailAndPassword,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.login = async function(){

  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  const loader  = document.getElementById("loader");
  const btnText = document.getElementById("btnText");
  const btn     = document.getElementById("btn");
  const erro    = document.getElementById("erro");
  const box     = document.getElementById("box");

  erro.style.display = "none";
  btn.disabled = true;
  loader.style.display = "block";
  btnText.textContent = "Entrando...";

  try {

    await setPersistence(auth, browserLocalPersistence);

    await signInWithEmailAndPassword(auth, email, senha);

    window.location.href = "painel.html";

  } catch (error) {

    loader.style.display = "none";
    btnText.textContent = "Entrar";
    btn.disabled = false;

    erro.style.display = "block";
    box.classList.add("shake");
    setTimeout(() => box.classList.remove("shake"), 400);
  }

};
</script>

</body>
</html>

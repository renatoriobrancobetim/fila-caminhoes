<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Fila | ERP Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#0A3D91;
  --azul-claro:#1557c0;
  --vermelho:#dc3545;
  --cinza-bg:#f4f6f9;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--cinza-bg);
}

/* HEADER */
.header{
  background:linear-gradient(90deg,var(--azul),var(--azul-claro));
  color:#fff;
  padding:18px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header h1{
  margin:0;
  font-size:20px;
}

.nav a{
  color:#fff;
  text-decoration:none;
  margin-left:18px;
  font-size:14px;
}

.container{
  padding:30px;
  max-width:1200px;
  margin:auto;
}

.card{
  background:#fff;
  padding:25px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
  margin-bottom:30px;
}

.card h2{
  margin-top:0;
  color:var(--azul);
}

/* FILA */
.lista{
  margin-top:15px;
}

.item{
  padding:15px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.item.proximo{
  background:#e9f1ff;
  border-left:6px solid var(--azul);
}

.item.alerta{
  background:#fff3cd;
  border-left:6px solid #ffc107;
}

.item.critico{
  background:#ffe5e5;
  border-left:6px solid var(--vermelho);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:15px;
  margin-top:20px;
}

.card-veiculo{
  background:#fff;
  border-radius:12px;
  padding:18px;
  box-shadow:0 4px 15px rgba(0,0,0,.08);
  border-top:4px solid var(--azul);
}

.card-veiculo.critico{
  border-top:4px solid var(--vermelho);
}

.card-veiculo h3{
  margin:0;
  color:var(--azul);
}

.card-veiculo small{
  display:block;
  margin-top:6px;
  color:#666;
}

.card-veiculo a{
  display:inline-block;
  margin-top:8px;
  font-size:13px;
  color:var(--azul);
  text-decoration:none;
  font-weight:600;
}

.btn{
  margin-top:12px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  width:100%;
}

.btn-azul{ background:var(--azul); color:#fff; }
.btn-vermelho{ background:var(--vermelho); color:#fff; }

.footer{
  text-align:center;
  padding:25px;
  font-size:13px;
  color:#777;
}
  /* BADGE PRÓXIMO */
.badge-proximo{
  background:#28a745;
  color:#fff;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
  margin-bottom:8px;
  font-weight:600;
  animation:floatBadge 1.8s ease-in-out infinite;
}

@keyframes floatBadge{
  0%{ transform:translateY(0px); }
  50%{ transform:translateY(-4px); }
  100%{ transform:translateY(0px); }
}
  /* ===== ANIMAÇÃO HOVER FILA ===== */

.item{
  transition:all .25s ease;
  position:relative;
  cursor:pointer;
}

.item:hover{
  transform:translateY(-3px) scale(1.01);
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  background:#f8fbff;
}

/* brilho animado lateral */
.item::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
  transition:.6s;
}

.item:hover::after{
  left:100%;
}
  /* ===== PULSO DO PRIMEIRO ===== */

.item.proximo{
  animation:pulseProximo 1.8s ease-in-out infinite;
}

@keyframes pulseProximo{
  0%{ box-shadow:0 0 0 0 rgba(10,61,145,.4); }
  70%{ box-shadow:0 0 0 12px rgba(10,61,145,0); }
  100%{ box-shadow:0 0 0 0 rgba(10,61,145,0); }
}
  /* ===== VIBRAÇÃO SUAVE ===== */

.item:hover{
  animation:shake 0.25s linear 1;
}

@keyframes shake{
  0%{ transform:translateX(0); }
  25%{ transform:translateX(-2px); }
  50%{ transform:translateX(2px); }
  75%{ transform:translateX(-2px); }
  100%{ transform:translateX(0); }
}
  /* ===== SPINNER ===== */

.loader{
  width:16px;
  height:16px;
  border:3px solid rgba(255,255,255,0.3);
  border-top:3px solid #fff;
  border-radius:50%;
  display:inline-block;
  margin-left:8px;
  animation:spin 0.7s linear infinite;
}

.hidden{
  display:none;
}

@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}
  /* ===== BRILHO AO CHAMAR ===== */

.item.chamando{
  background:#e6ffed !important;
  border-left:6px solid #28a745 !important;
  animation:blinkChamada .6s ease-in-out 3;
}

@keyframes blinkChamada{
  0%{ box-shadow:0 0 0 0 rgba(40,167,69,.6); }
  50%{ box-shadow:0 0 18px 4px rgba(40,167,69,.7); }
  100%{ box-shadow:0 0 0 0 rgba(40,167,69,0); }
}

/* ===== TRANSIÇÃO SUAVE DE SAÍDA ===== */

.item.saindo{
  opacity:0;
  transform:translateX(40px);
  transition:all .4s ease;
}
</style>
</head>

<body>

<div class="header">
  <h1>🚚 Controle de Fila</h1>
  <div class="nav">
    <a href="painel.html">Painel</a>
    <a href="frete.html">Frete</a>
    <a href="motoristas.html">Disponibilidade</a>
  </div>
</div>

<div class="container">

  <!-- FILA -->
  <div class="card">
    <h2>📋 Fila Atual</h2>
<button class="btn btn-vermelho" id="btnChamar" onclick="chamarProximo()">
  <span id="btnText">🔔 Chamar Próximo</span>
  <span id="btnLoader" class="loader hidden"></span>
</button>
    <div class="lista" id="listaFila"></div>
  </div>

  <!-- DISPONÍVEIS -->
  <div class="card">
    <h2>🚛 Caminhões Disponíveis</h2>
    <div class="grid" id="listaDisp"></div>
  </div>

  <!-- ATENDIMENTO -->
  <div class="card">
    <h2>🚧 Em Atendimento</h2>
    <div class="grid" id="listaAtendimento"></div>
  </div>

</div>

<div class="footer">
  © 2026 • Renato Monteiro
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, collection, doc, setDoc,
  deleteDoc, getDocs, onSnapshot,
  query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKdfOvWehaJcuK6uX5JXxc7YdN26h8sXY",
  authDomain: "tabela-frete-rio-branco.firebaseapp.com",
  projectId: "tabela-frete-rio-branco"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const listaFila = document.getElementById("listaFila");
const listaDisp = document.getElementById("listaDisp");
const listaAtendimento = document.getElementById("listaAtendimento");

onAuthStateChanged(auth,user=>{
  if(!user){
    window.location="login.html";
  }else{
    carregarFila();
    carregarDisponibilidade();
    carregarAtendimento();
  }
});

/* FILA */
function carregarFila(){
  const q = query(collection(db,"fila"), orderBy("entradaEm"));
  onSnapshot(q,snapshot=>{
    listaFila.innerHTML="";
    snapshot.forEach((docSnap,i)=>{
      const c = docSnap.data();
 listaFila.innerHTML+=`
  <div class="item ${i===0?"proximo":""}" id="fila-${docSnap.id}">
    <b>${c.placa}</b>
  </div>
`;
    });
  });
}

/* DISPONÍVEIS */
function carregarDisponibilidade(){

  let motoristas=[];
  let fila=[];

 const qMotoristas = query(
  collection(db,"motoristas"),
  orderBy("atualizadoEm","asc")
);

onSnapshot(qMotoristas, snap=>{
    motoristas=snap.docs;
    render();
  });

  onSnapshot(collection(db,"fila"), snap=>{
    fila=snap.docs.map(d=>d.id);
    render();
  });

function render(){

  listaDisp.innerHTML="";

  // 🔥 1️⃣ Filtra primeiro
  const disponiveis = motoristas.filter(docSnap=>{
    const c = docSnap.data();
    if((c.status||"").toUpperCase()!=="DISPONÍVEL") return false;
    if(fila.includes(docSnap.id)) return false;
    return true;
  });

  // 🔥 2️⃣ Agora percorre os filtrados
  disponiveis.forEach((docSnap,index)=>{
    const c = docSnap.data();

    listaDisp.innerHTML+=`
      <div class="card-veiculo">
        ${index===0 ? `<div class="badge-proximo">🟢 PRÓXIMO</div>` : ""}

        <h3>${c.placa}</h3>

        <small>
          ⏱ Disponível desde:
          ${c.atualizadoEm?.toDate().toLocaleTimeString()}
        </small>

        <small>
          📍 ${c.latitude?.toFixed(5)}, ${c.longitude?.toFixed(5)}
        </small>

        <a href="https://www.google.com/maps?q=${c.latitude},${c.longitude}" target="_blank">
          Ver no mapa
        </a>

        <button class="btn btn-azul" onclick="addFila('${c.placa}')">
          ➕ Adicionar à Fila
        </button>
      </div>
    `;
  });

}
}

/* ATENDIMENTO */
function carregarAtendimento(){
  onSnapshot(collection(db,"motoristas"), snapshot=>{
    listaAtendimento.innerHTML="";
    snapshot.forEach(docSnap=>{
      const c=docSnap.data();
      if((c.status||"").toUpperCase()!=="EM_ATENDIMENTO") return;
      listaAtendimento.innerHTML+=`
        <div class="card-veiculo critico">
          <h3>${c.placa}</h3>
          <small>🚧 Em atendimento</small>
        </div>
      `;
    });
  });
}

/* AÇÕES */
window.addFila=async function(placa){
  await setDoc(doc(db,"fila",placa),{
    placa,
    entradaEm:serverTimestamp()
  });
};

window.chamarProximo = async function(){

  const btn = document.getElementById("btnChamar");
  const text = document.getElementById("btnText");
  const loader = document.getElementById("btnLoader");

  btn.disabled = true;
  text.innerText = "Chamando...";
  loader.classList.remove("hidden");

  const q = query(collection(db,"fila"),orderBy("entradaEm"));
  const snap = await getDocs(q);

  if(snap.empty){
    alert("Fila vazia");
    resetBtn();
    return;
  }

  const primeiro = snap.docs[0];
  const placa = primeiro.id;

  const elemento = document.getElementById(`fila-${placa}`);

  if(elemento){
    elemento.classList.add("chamando");

    // Espera animação de brilho
    await new Promise(res => setTimeout(res, 900));

    elemento.classList.add("saindo");

    // Espera transição sair
    await new Promise(res => setTimeout(res, 400));
  }

  await setDoc(doc(db,"motoristas",placa),{
    status:"EM_ATENDIMENTO"
  },{merge:true});

  await deleteDoc(doc(db,"fila",placa));

  resetBtn();

  function resetBtn(){
    btn.disabled = false;
    text.innerText = "🔔 Chamar Próximo";
    loader.classList.add("hidden");
  }
};

</script>
</body>
</html>

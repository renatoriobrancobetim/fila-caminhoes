<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="favicon.png">
<meta charset="UTF-8">
<title>Fila de Caminhões</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#0A3D91;
  --azul-escuro:#062b66;
  --vermelho:#D71920;
  --verde:#198754;
  --amarelo:#FFC107;
  --cinza-claro:#f4f6fa;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(180deg,var(--azul),var(--azul-escuro));
  color:#fff;
}

.tv-header{
  padding:25px;
  text-align:center;
  border-bottom:4px solid var(--vermelho);
}

.tv-header h1{
  margin:0;
  font-size:34px;
  letter-spacing:1px;
}

.tv-header p{
  margin:5px 0 0;
  font-size:16px;
  opacity:.9;
}

.container{
  padding:30px;
  max-width:1400px;
  margin:auto;
}

.cards{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:25px;
  margin-bottom:30px;
}

.card{
  padding:35px;
  border-radius:18px;
  text-align:center;
  font-weight:700;
  box-shadow:0 15px 40px rgba(0,0,0,.45);
  position:relative;
  overflow:hidden;
}

.card span{
  display:block;
  font-size:14px;
  font-weight:500;
  margin-bottom:10px;
  letter-spacing:1px;
}

.proximo{
  background:linear-gradient(135deg,var(--vermelho),#ff3b3b);
  font-size:46px;
  letter-spacing:3px;
}

.proximo::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:shine 4s infinite;
}

@keyframes shine{
  0%{left:-100%}
  100%{left:100%}
}

.total{
  background:linear-gradient(135deg,#1E90FF,#0b5ed7);
  font-size:40px;
}

.flash{
  animation:flash 0.6s ease 2;
}

@keyframes flash{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

.table-wrap{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

table{
  width:100%;
  border-collapse:collapse;
  color:#000;
}

th{
  background:var(--azul);
  color:#fff;
  padding:18px;
  font-size:17px;
  letter-spacing:.5px;
}

td{
  padding:18px;
  font-size:20px;
  font-weight:500;
  border-bottom:1px solid #e5e7eb;
}

tbody tr:hover{
  background:#eef3ff;
}

tbody tr:first-child{
  background:#fff3cd;
  font-weight:700;
  font-size:22px;
}

.alerta{
  background:#ffeeba !important;
}

.critico{
  background:#f8d7da !important;
  font-weight:700;
}

.status{
  text-align:center;
  margin-top:18px;
  font-size:13px;
  opacity:.8;
}

@media(max-width:900px){
  .cards{grid-template-columns:1fr}
  .proximo{font-size:34px}
}
  .ultima-carga{
  margin-top:40px;
}

.ultima-carga h2{
  text-align:center;
  margin-bottom:20px;
}

.card-carga{
  background:#ffffff;
  color:#000;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  font-size:18px;
  font-weight:500;
}
</style>
</head>

<body>

<header class="tv-header">
  <h1>🚛 Ordem de Carregamento</h1>
  <p>Fila de Espera de Caminhões</p>
</header>

<div class="container">

  <div class="cards">
    <div class="card proximo" id="proximo">
      <span>🔔 PRÓXIMO CAMINHÃO</span>
      Carregando...
    </div>

    <div class="card total" id="totalFila">
      <span>🚚 TOTAL NA FILA</span>
      0
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ordem</th>
          <th>Placa</th>
          <th>Compartimento</th>
          <th>Tempo na Fila</th>
        </tr>
      </thead>
      <tbody id="fila"></tbody>
    </table>
  </div>
<div class="ultima-carga">
  <h2>📦 Última Carga Alocada</h2>
  <div id="cardUltimaCarga" class="card-carga">
    Carregando...
  </div>
</div>
  
  <div class="status">© 2026 · Copywriter Renato Monteiro</div>

</div>

<audio id="somChamada">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  orderBy,
  onSnapshot,
  getDocs,
  limit,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKdfOvWehaJcuK6uX5JXxc7YdN26h8sXY",
  authDomain: "tabela-frete-rio-branco.firebaseapp.com",
  projectId: "tabela-frete-rio-branco"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tbody = document.getElementById("fila");
const proximoCard = document.getElementById("proximo");
const totalFila = document.getElementById("totalFila");
let statusAtualizacao = document.getElementById("statusAtualizacao");

let ultimoProximo = "";
let mapaCompartimentos = {};
let dadosFila = [];

/* UTIL */
function calcularMinutos(timestamp){
  if(!timestamp) return 0;
  const data = timestamp.toDate();
  return Math.floor((new Date()-data)/60000);
}

function tocarSom(){
  document.getElementById("somChamada").play().catch(()=>{});
}

/* CARREGAR COMPARTIMENTOS */
async function carregarCompartimentos(){
  const snap = await getDocs(collection(db,"motoristas_cadastro"));
  snap.forEach(docSnap=>{
    const d = docSnap.data();
    mapaCompartimentos[docSnap.id] = d.configEixos || "-";
  });
}

await carregarCompartimentos();

/* RENDERIZAÇÃO */
function renderizarFila(){

  tbody.innerHTML="";
  totalFila.innerHTML=`<span>🚚 TOTAL NA FILA</span>${dadosFila.length}`;

  if(dadosFila.length===0){
    proximoCard.innerHTML="<span>🔔 PRÓXIMO CAMINHÃO</span>Fila vazia";
    return;
  }
  if(!statusAtualizacao){
  statusAtualizacao = document.getElementById("statusAtualizacao");
}

  let index=1;

  dadosFila.forEach(c=>{

    const minutos = calcularMinutos(c.entradaEm);

    let classe="";
    if(minutos>=60) classe="critico";
    else if(minutos>=30) classe="alerta";

    tbody.innerHTML+=`
      <tr class="${classe}">
        <td>${index}</td>
        <td>${c.placa}</td>
        <td>${mapaCompartimentos[c.placa] || "-"}</td>
        <td>${minutos} min</td>
      </tr>
    `;

    if(index===1){

      const atual=c.placa;

      proximoCard.innerHTML=
        `<span>🔔 PRÓXIMO CAMINHÃO</span>${c.placa}`;

      if(atual!==ultimoProximo){
        ultimoProximo=atual;
        proximoCard.classList.remove("flash");
        void proximoCard.offsetWidth;
        proximoCard.classList.add("flash");
        tocarSom();
      }
    }

    index++;
  });

 if(statusAtualizacao){
  statusAtualizacao.textContent =
    "Última atualização: " + new Date().toLocaleTimeString();
}
}

/* TEMPO REAL FIRESTORE */
const q = query(collection(db,"fila"), orderBy("entradaEm"));

onSnapshot(q, snapshot=>{

  dadosFila = [];

  snapshot.forEach(docSnap=>{
    dadosFila.push(docSnap.data());
  });

  renderizarFila();
});
/* =========================
   ÚLTIMAS 10 CARGAS PROGRAMADAS
========================= */

const cardUltimaCarga = document.getElementById("cardUltimaCarga");

// 🔵 Pré-carrega motoristas uma vez
let mapaMotoristas = {};

async function carregarMotoristas(){
  const snap = await getDocs(collection(db,"motoristas_cadastro"));
  snap.forEach(docSnap=>{
    mapaMotoristas[docSnap.id] = docSnap.data().nome || "-";
  });
}

await carregarMotoristas();

const qUltimasCargas = query(
  collection(db,"programacao_cargas"),
  orderBy("criadoEm","desc"),
  limit(20) // busca mais para garantir 10 programadas
);

onSnapshot(qUltimasCargas, (snapshot) => {

  if(snapshot.empty){
    cardUltimaCarga.innerHTML = "Nenhuma carga encontrada.";
    return;
  }

  const cargasProgramadas = snapshot.docs
    .map(doc => doc.data())
    .filter(c => c.status === "PROGRAMADO" && c.placa)
    .slice(0,10);

  if(cargasProgramadas.length === 0){
    cardUltimaCarga.innerHTML = "Nenhuma carga programada no momento.";
    return;
  }

  let html = `
    <div style="
      display:flex;
      flex-direction:column;
      gap:8px;
      font-size:14px;
    ">
  `;

cargasProgramadas.forEach(carga => {

  const primeiraCidade = carga.compartimentos
    ?.find(c => c.municipio)?.municipio || "-";

  const nomeMotorista = mapaMotoristas[carga.placa] || "-";

  const dataCarga = carga.dataCarregamento?.toDate
    ? carga.dataCarregamento.toDate().toLocaleDateString()
    : carga.dataReferencia || "-";

  const horaCriacao = carga.criadoEm?.toDate
    ? carga.criadoEm.toDate().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})
    : "-";

  html += `
<div style="
  display:flex;
  flex-wrap:wrap;
  gap:22px;
  align-items:center;
  background:#ffffff;
  padding:16px 20px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  transition:all .25s ease;
  cursor:default;
"
onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 10px 22px rgba(0,0,0,.15)';"
onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 12px rgba(0,0,0,.08)';"
>

  <div>
    <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;">
      📦 Carga
    </div>
    <div style="font-weight:700;color:#0A3D91;">
      ${carga.numeroCarga}
    </div>
  </div>

  <div>
    <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;">
      📅 Data
    </div>
    <div>
      ${dataCarga}
    </div>
  </div>

  <div>
    <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;">
      ⏰ Hora
    </div>
    <div>
      ${horaCriacao}
    </div>
  </div>

  <div>
    <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;">
      🚛 Placa
    </div>
    <div style="font-weight:600;color:#dc2626;">
      ${carga.placa}
    </div>
  </div>

  <div>
    <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;">
      👤 Motorista
    </div>
    <div>
      ${nomeMotorista}
    </div>
  </div>

  <div>
    <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;">
      📍 Cidade
    </div>
    <div>
      ${primeiraCidade}
    </div>
  </div>

  <div>
    <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;">
      🧩 Partição
    </div>
    <div>
      ${carga.configEixos}
    </div>
  </div>

</div>
`;
});

    html += "</div>";
  cardUltimaCarga.innerHTML = html;

});

/* ATUALIZA TEMPO A CADA 60 SEGUNDOS */
setInterval(()=>{
  if(dadosFila.length>0){
    renderizarFila();
  }
},60000);

</script>

</body>
</html>

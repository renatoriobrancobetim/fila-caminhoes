<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fila de Caminhões | Rio Branco</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#0A3D91;
  --azul-escuro:#062b66;
  --vermelho:#D71920;
  --verde:#198754;
  --amarelo:#FFC107;
  --cinza-claro:#f4f6fa;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(180deg,var(--azul),var(--azul-escuro));
  color:#fff;
}

/* HEADER */
.tv-header{
  padding:25px;
  text-align:center;
  border-bottom:4px solid var(--vermelho);
}

.tv-header h1{
  margin:0;
  font-size:34px;
  letter-spacing:1px;
}

.tv-header p{
  margin:5px 0 0;
  font-size:16px;
  opacity:.9;
}

/* CONTAINER */
.container{
  padding:30px;
  max-width:1400px;
  margin:auto;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:25px;
  margin-bottom:30px;
}

.card{
  padding:35px;
  border-radius:18px;
  text-align:center;
  font-weight:700;
  box-shadow:0 15px 40px rgba(0,0,0,.45);
  position:relative;
  overflow:hidden;
}

.card span{
  display:block;
  font-size:14px;
  font-weight:500;
  margin-bottom:10px;
  letter-spacing:1px;
}

/* PRÓXIMO */
.proximo{
  background:linear-gradient(135deg,var(--vermelho),#ff3b3b);
  font-size:46px;
  letter-spacing:3px;
}

.proximo::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:shine 4s infinite;
}

@keyframes shine{
  0%{left:-100%}
  100%{left:100%}
}

/* TOTAL */
.total{
  background:linear-gradient(135deg,#1E90FF,#0b5ed7);
  font-size:40px;
}

/* ANIMAÇÃO */
.flash{
  animation:flash 0.6s ease 2;
}

@keyframes flash{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

/* TABELA */
.table-wrap{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

table{
  width:100%;
  border-collapse:collapse;
  color:#000;
}

th{
  background:var(--azul);
  color:#fff;
  padding:18px;
  font-size:17px;
  letter-spacing:.5px;
}

td{
  padding:18px;
  font-size:20px;
  font-weight:500;
  border-bottom:1px solid #e5e7eb;
}

tbody tr{
  transition:.2s;
}

tbody tr:hover{
  background:#eef3ff;
}

/* PRIMEIRO DA FILA */
tbody tr:first-child{
  background:#fff3cd;
  font-weight:700;
  font-size:22px;
}

/* ALERTAS */
.alerta{
  background:#ffeeba !important;
}

.critico{
  background:#f8d7da !important;
  font-weight:700;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:18px;
  font-size:13px;
  opacity:.8;
}

/* RESPONSIVO */
@media(max-width:900px){
  .cards{grid-template-columns:1fr}
  .proximo{font-size:34px}
}
</style>
</head>

<body>

<header class="tv-header">
  <h1>🚛 Rio Branco Distribuidora</h1>
  <p>Fila de Espera de Caminhões</p>
</header>

<div class="container">

  <div class="cards">
    <div class="card proximo" id="proximo">
      <span>🔔 PRÓXIMO CAMINHÃO</span>
      Carregando...
    </div>

    <div class="card total" id="totalFila">
      <span>🚚 TOTAL NA FILA</span>
      0
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ordem</th>
          <th>Placa</th>
          <th>Compartimento</th>
          <th>Tempo na Fila</th>
        </tr>
      </thead>
      <tbody id="fila"></tbody>
    </table>
  </div>

  <div class="status" id="statusAtualizacao">Atualizando...</div>
  <div class="status">© 2026 · Copywriter Renato Monteiro</div>

</div>

<audio id="somChamada">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore,
  collection,
  query,
  orderBy,
  onSnapshot,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKdfOvWehaJcuK6uX5JXxc7YdN26h8sXY",
  authDomain: "tabela-frete-rio-branco.firebaseapp.com",
  projectId: "tabela-frete-rio-branco"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tbody = document.getElementById("fila");
const proximoCard = document.getElementById("proximo");
const totalFila = document.getElementById("totalFila");
const statusAtualizacao = document.getElementById("statusAtualizacao");

let ultimoProximo = "";
  let mapaCompartimentos = {};

/* UTIL */
function calcularMinutos(timestamp){
  if(!timestamp) return 0;
  const data = timestamp.toDate();
  return Math.floor((new Date()-data)/60000);
}

function tocarSom(){
  document.getElementById("somChamada").play().catch(()=>{});
}

/* FILA TEMPO REAL */

const q = query(collection(db,"fila"), orderBy("entradaEm"));
  // 🔵 Carrega tipos de compartimento
async function carregarCompartimentos(){

  const snap = await getDocs(collection(db,"motoristas_cadastro"));

  snap.forEach(docSnap=>{
    const d = docSnap.data();
    mapaCompartimentos[docSnap.id] = d.configEixos || "-";
  });

}

await carregarCompartimentos();

onSnapshot(q,snapshot=>{

  tbody.innerHTML="";
  totalFila.innerHTML=`<span>🚚 TOTAL NA FILA</span>${snapshot.size}`;

  if(snapshot.empty){
    proximoCard.innerHTML="<span>🔔 PRÓXIMO CAMINHÃO</span>Fila vazia";
    return;
  }

  let index=1;

  snapshot.forEach(docSnap=>{

    const c = docSnap.data();
    const minutos = calcularMinutos(c.entradaEm);

    let classe="";
    if(minutos>=60) classe="critico";
    else if(minutos>=30) classe="alerta";

    tbody.innerHTML+=`
      <tr class="${classe}">
        <td>${index}</td>
        <td>${c.placa}</td>
       <td>${mapaCompartimentos[c.placa] || "-"}</td>
        <td>${minutos} min</td>
      </tr>
    `;

    if(index===1){
      const atual=c.placa;

      proximoCard.innerHTML=
        `<span>🔔 PRÓXIMO CAMINHÃO</span>${c.placa}`;

      if(atual!==ultimoProximo){
        ultimoProximo=atual;
        proximoCard.classList.remove("flash");
        void proximoCard.offsetWidth;
        proximoCard.classList.add("flash");
        tocarSom();
      }
    }

    index++;
  });

  statusAtualizacao.textContent=
    "Última atualização: "+new Date().toLocaleTimeString();

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Programação de Cargas | ERP Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#0A3D91;
  --azul-claro:#1557c0;
  --vermelho:#dc2626;
  --cinza:#f1f5f9;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--cinza);
}

/* HEADER */
header{
  background:linear-gradient(90deg,var(--azul),var(--vermelho));
  color:#fff;
  padding:25px;
  text-align:center;
}

/* CONTAINER */
main{
  padding:40px;
  max-width:1300px;
  margin:auto;
}

/* FILTROS */
.filtros{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:30px;
}

.filtros input,
.filtros select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

.btn{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-azul{ background:var(--azul); color:#fff; }
.btn-vermelho{ background:var(--vermelho); color:#fff; }

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.kpi-card{
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.kpi-card h3{
  margin:0;
  font-size:14px;
  color:#64748b;
}

.kpi-card p{
  margin:6px 0 0;
  font-size:22px;
  font-weight:700;
}

/* TABELA */
.table-wrap{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  border-bottom:1px solid #eee;
  text-align:center;
  font-size:14px;
}

th{
  background:var(--azul);
  color:#fff;
}

/* STATUS */
.status{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.programado{ background:#cfe2ff; color:#084298; }
.emfila{ background:#fff3cd; color:#664d03; }
.carregando{ background:#ffe5d0; color:#842029; }
.finalizado{ background:#d1e7dd; color:#0f5132; }
.cancelado{ background:#f8d7da; color:#842029; }

</style>
</head>

<body>

<header>
<h1>📦 Programação de Cargas</h1>
<p>Gestão Operacional Integrada</p>
</header>

<main>

<div class="filtros">
  <input type="date" id="filtroData">
  <select id="filtroStatus">
    <option value="">Todos Status</option>
    <option value="PROGRAMADO">Programado</option>
    <option value="EM_FILA">Em Fila</option>
    <option value="EM_CARREGAMENTO">Em Carregamento</option>
    <option value="FINALIZADO">Finalizado</option>
  </select>

  <button class="btn btn-azul">+ Nova Carga</button>
</div>

<div class="kpi">
  <div class="kpi-card">
    <h3>Total Cargas do Dia</h3>
    <p id="kpiTotal">0</p>
  </div>
  <div class="kpi-card">
    <h3>Total CIF</h3>
    <p id="kpiCIF">0</p>
  </div>
  <div class="kpi-card">
    <h3>Volume Total</h3>
    <p id="kpiVolume">0</p>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Cliente</th>
        <th>Município</th>
        <th>Placa</th>
        <th>Motorista</th>
        <th>Volume</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabelaCargas">
      <!-- Cargas renderizadas aqui -->
    </tbody>
  </table>
</div>

</main>

</body>
</html>

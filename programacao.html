<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Programação de Cargas | ERP Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#0A3D91;
  --vermelho:#dc2626;
  --cinza:#f1f5f9;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--cinza);
}

header{
  background:linear-gradient(90deg,var(--azul),var(--vermelho));
  color:#fff;
  padding:25px;
  text-align:center;
}

main{
  padding:40px;
  max-width:1300px;
  margin:auto;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-bottom:20px;
}

input, select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

.btn{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-azul{ background:var(--azul); color:#fff; }

.table-wrap{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  margin-top:30px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  border-bottom:1px solid #eee;
  text-align:center;
  font-size:14px;
}

th{
  background:var(--azul);
  color:#fff;
}

.status{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.PROGRAMADO{ background:#cfe2ff; color:#084298; }
.EM_FILA{ background:#fff3cd; color:#664d03; }
.EM_CARREGAMENTO{ background:#ffe5d0; color:#842029; }
.FINALIZADO{ background:#d1e7dd; color:#0f5132; }
.CANCELADO{ background:#f8d7da; color:#842029; }

</style>
</head>

<body>

<header>
<h1>📦 Programação de Cargas</h1>
<p>Módulo Operacional Integrado</p>
</header>

<main>

<h2>Nova Carga</h2>

<div class="form-grid">
  <input type="date" id="dataCarregamento">
  <input type="text" id="vendedor" placeholder="Vendedor">
  <input type="text" id="cliente" placeholder="Cliente">
  <input type="text" id="municipio" placeholder="Município">
  <input type="text" id="tipoCaminhao" placeholder="Tipo Caminhão">
  <input type="number" id="volume" placeholder="Volume">
  <input type="number" id="freteUnitario" placeholder="Frete Unitário">
  <input type="number" id="total" placeholder="Total">
  <input type="time" id="horarioPrevisto">
  <input type="text" id="placa" placeholder="Placa">
  <input type="number" id="km" placeholder="KM">
  <input type="text" id="observacoes" placeholder="Observações">
</div>

<button class="btn btn-azul" onclick="criarCarga()">Salvar Carga</button>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Cliente</th>
        <th>Município</th>
        <th>Placa</th>
        <th>Motorista</th>
        <th>Volume</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tabelaCargas"></tbody>
  </table>
</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  getDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKdfOvWehaJcuK6uX5JXxc7YdN26h8sXY",
  authDomain: "tabela-frete-rio-branco.firebaseapp.com",
  projectId: "tabela-frete-rio-branco"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tabela = document.getElementById("tabelaCargas");

/* SALVAR CARGA */

async function salvarCarga(dados){

  const cadastroRef = doc(db,"motoristas_cadastro",dados.placa);
  const cadastroSnap = await getDoc(cadastroRef);

  if(!cadastroSnap.exists()){
    alert("Placa não cadastrada!");
    return;
  }

  const dadosPlaca = cadastroSnap.data();

  const novaCarga = {
    dataCarregamento: new Date(dados.dataCarregamento),
    vendedor: dados.vendedor,
    cliente: dados.cliente,
    municipio: dados.municipio,
    tipoCaminhao: dados.tipoCaminhao,
    volume: Number(dados.volume),
    freteUnitario: Number(dados.freteUnitario),
    total: Number(dados.total),
    horarioPrevisto: dados.horarioPrevisto,
    observacoes: dados.observacoes || "",
    placa: dados.placa,
    motorista: dadosPlaca.motorista || "",
    configEixos: dadosPlaca.configEixos || "",
    capacidade: dadosPlaca.capacidade || 0,
    transportadora: dadosPlaca.transportadora || "",
    plotado: dadosPlaca.plotado || false,
    km: Number(dados.km) || 0,
    status: "PROGRAMADO",
    criadoEm: serverTimestamp()
  };

  await addDoc(collection(db,"programacao_cargas"), novaCarga);

  alert("Carga criada com sucesso!");
}

window.criarCarga = function(){

  const dados = {
    dataCarregamento: document.getElementById("dataCarregamento").value,
    vendedor: document.getElementById("vendedor").value,
    cliente: document.getElementById("cliente").value,
    municipio: document.getElementById("municipio").value,
    tipoCaminhao: document.getElementById("tipoCaminhao").value,
    volume: document.getElementById("volume").value,
    freteUnitario: document.getElementById("freteUnitario").value,
    total: document.getElementById("total").value,
    horarioPrevisto: document.getElementById("horarioPrevisto").value,
    placa: document.getElementById("placa").value.toUpperCase(),
    km: document.getElementById("km").value,
    observacoes: document.getElementById("observacoes").value
  };

  salvarCarga(dados);
};

/* RENDERIZAR TABELA */

onSnapshot(collection(db,"programacao_cargas"), snapshot=>{

  tabela.innerHTML="";

  snapshot.forEach(docSnap=>{
    const c = docSnap.data();

    tabela.innerHTML+=`
      <tr>
        <td>${c.dataCarregamento?.toDate().toLocaleDateString()}</td>
        <td>${c.cliente}</td>
        <td>${c.municipio}</td>
        <td>${c.placa}</td>
        <td>${c.motorista}</td>
        <td>${c.volume}</td>
        <td><span class="status ${c.status}">${c.status}</span></td>
      </tr>
    `;
  });

});

</script>

</body>
</html>

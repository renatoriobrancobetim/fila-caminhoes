<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="favicon.png">
<meta charset="UTF-8">
<title>Programação de Cargas | ERP Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#0A3D91;
  --vermelho:#dc2626;
  --cinza:#f1f5f9;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--cinza);
}

/* HEADER */
header{
  background:linear-gradient(90deg,var(--azul),var(--vermelho));
  color:#fff;
  padding:25px;
  text-align:center;
}

main{
  padding:40px;
  max-width:1300px;
  margin:auto;
}

/* CARD FORM */
.card-form{
  background:#fff;
  padding:25px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.linha-topo,.linha-bottom{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
  margin-bottom:15px;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.info-veiculo{
  background:#f1f5f9;
  padding:12px;
  border-radius:10px;
  font-weight:600;
  margin-bottom:15px;
  display:none;
}

.compartimento{
  background:#f8fafc;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:grid;
  grid-template-columns:120px 1fr 1fr 1fr;
  gap:10px;
}

.capacidade{
  font-weight:700;
  color:var(--azul);
}

/* BOTÕES */
.btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-azul{ background:var(--azul); color:#fff; }
.btn-vincular{ background:#198754; color:#fff; }
.btn-excluir{ background:#dc2626; color:#fff; }
.btn-warning{ background:#f59e0b; color:#fff; }

/* LOADER */
.loader{
  width:16px;
  height:16px;
  border:3px solid rgba(255,255,255,0.4);
  border-top:3px solid #fff;
  border-radius:50%;
  display:inline-block;
  margin-left:8px;
  animation:spin .7s linear infinite;
}

.hidden{ display:none !important; }

@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

/* TABELA */
.table-wrap{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  margin-top:30px;
}

table{
  width:100%;
  border-collapse:collapse;
}

thead tr{
  background:var(--azul);
}

th{
  color:#fff;
  padding:16px;
  text-align:center;
}

td{
  padding:14px;
  border-bottom:1px solid #f1f5f9;
  text-align:center;
}

/* STATUS BADGE */
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  letter-spacing:.5px;
  transition:all .3s ease;
}

.status-AGUARDANDO_FILA{
  background:#fef3c7;
  color:#92400e;
  border:1px solid #fde68a;
}

.status-PROGRAMADO{
  background:#dcfce7;
  color:#166534;
  border:1px solid #86efac;
}

/* TONALIDADE SUAVE NA LINHA */
.linha-status td{
  transition: background .25s ease;
}

.linha-status.status-AGUARDANDO_FILA td{
  background:#fffbeb;
}

.linha-status.status-PROGRAMADO td{
  background:#f0fdf4;
}

/* HOVER SUAVE */
.linha-status:hover td{
  background:#f8fafc;
}

/* COLUNA AÇÕES */
.col-acoes{
  display:flex;
  gap:8px;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  background:#fff;
  width:400px;
  max-width:90%;
  padding:25px;
  border-radius:14px;
}

.modal-actions{
  margin-top:20px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

/* DETALHE EXPANDIDO */
.detalhe-linha td{
  background:#fff !important;
}

.detalhe-container{
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  margin:10px 0;
}

.detalhe-header{
  background:linear-gradient(90deg,#0A3D91,#1e3a8a);
  color:#fff;
  padding:12px 20px;
  font-weight:600;
  font-size:14px;
}

.detalhe-colunas{
  background:#e2e8f0;
  display:grid;
  grid-template-columns:2fr 2fr 1fr 1fr;
  padding:10px 20px;
  font-weight:600;
  font-size:12px;
  text-transform:uppercase;
}

.detalhe-item{
  display:grid;
  grid-template-columns:2fr 2fr 1fr 1fr;
  padding:12px 20px;
  border-top:1px solid #e5e7eb;
  font-size:14px;
  align-items:center;
}

.detalhe-item:nth-child(even){
  background:#f8fafc;
}

.volume-destaque{
  font-weight:700;
  color:#0A3D91;
}
  .campo{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.campo label{
  font-size:12px;
  font-weight:600;
  color:#334155;
  text-transform:uppercase;
  letter-spacing:.5px;
  display:flex;
  align-items:center;
  gap:6px;
}

.icon{
  font-size:14px;
}
  
</style>
</head>
<body>

<header>
<h1>📦 Programação de Cargas</h1>
<p>Módulo Operacional Integrado</p>
</header>

<main>

<div class="card-form">
<div class="linha-topo">

  <div class="campo">
    <label>
      <span class="icon">📅</span>
      Data de Carregamento
    </label>
    <input type="date" id="dataCarregamento" placeholder="dd/mm/aaaa">
  </div>

  <div class="campo">
    <label>
      <span class="icon">⏰</span>
      Hora do Carregamento
    </label>
    <input type="time" id="horarioPrevisto" placeholder="--:--">
  </div>

  <div class="campo">
    <label>
      <span class="icon">🚛</span>
      Tipo de Veículo
    </label>
   <select id="tipoVeiculo">
  <option value="">Selecione Tipo</option>

  <option value="Toco|532">Toco 532</option>
  <option value="Truck|555">Truck 555</option>
  <option value="Truck|5532">Truck 5532</option>
  <option value="Truck|53232">Truck 53232</option>
  <option value="Bitruck|5555">Bitruck 5555</option>
  <option value="Frota|5-5-5-2.5-2.5-2.5">Frota 5-5-5/2.5/2.5/2.5</option>
  <option value="Carreta|555555">Carreta 555555</option>
</select>
  </div>

</div>

<div class="info-veiculo" id="infoVeiculo"></div>
<div id="containerCompartimentos"></div>

<div class="linha-bottom">
<input type="number" id="km" placeholder="KM">
<input type="text" id="observacoes" placeholder="Observações">
</div>

<button class="btn btn-azul" id="btnSalvar">
<span id="textoBtn">Salvar Carga</span>
<span id="loaderBtn" class="loader hidden"></span>
</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Nº</th>
<th>Data</th>
<th>Placa</th>
<th>Tipo</th>
<th>Total L</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabelaCargas"></tbody>
</table>
</div>

</main>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal-box">
    <h3 id="modalTitulo"></h3>
    <div id="modalConteudo"></div>
    <div class="modal-actions">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-azul" id="btnConfirmarModal">Confirmar</button>
    </div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged,
  setPersistence, 
  browserLocalPersistence 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  doc, 
  getDoc,      // 👈 ADICIONE ISSO
  getDocs, 
  updateDoc, 
  deleteDoc, 
  onSnapshot, 
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ===== FIREBASE INIT ===== */
const app = initializeApp({
  apiKey:"AIzaSyCKdfOvWehaJcuK6uX5JXxc7YdN26h8sXY",
 authDomain: "renatoriobrancobetim.github.io",
  projectId:"tabela-frete-rio-branco"
});

const db = getFirestore(app);
const auth = getAuth(app);

setPersistence(auth, browserLocalPersistence);

/* ===== VARIÁVEIS ===== */
let tipoCaminhaoAtual="";
let capacidadeTotalAtual=0;

const infoVeiculo=document.getElementById("infoVeiculo");
const container=document.getElementById("containerCompartimentos");
const tabela=document.getElementById("tabelaCargas");
const btnSalvar=document.getElementById("btnSalvar");
const textoBtn=document.getElementById("textoBtn");
const loaderBtn=document.getElementById("loaderBtn");

/* ===== GERAR COMPARTIMENTOS ===== */
document.getElementById("tipoVeiculo").addEventListener("change", e => {

  const valor = e.target.value;

  if (!valor) {
    tipoCaminhaoAtual="";
    container.innerHTML="";
    infoVeiculo.style.display="none";
    return;
  }

  const [tipo, configuracao] = valor.split("|");

  tipoCaminhaoAtual = tipo;

  let compartimentos = [];

  // Caso Frota (tem valores decimais)
  if (configuracao.includes("-")) {

    compartimentos = configuracao
      .split("-")
      .map(v => Number(v) * 1000);

  } else {

    compartimentos = configuracao
      .split("")
      .map(n => Number(n) * 1000);

  }

  capacidadeTotalAtual = compartimentos.reduce((a,b)=>a+b,0);

  infoVeiculo.style.display="block";
  infoVeiculo.innerHTML=`🚛 ${tipo} • ${capacidadeTotalAtual.toLocaleString()} L`;

  container.innerHTML="";

  compartimentos.forEach(cap=>{
    container.innerHTML+=`
      <div class="compartimento">
        <div class="capacidade">${cap.toLocaleString()} L</div>
        <input class="cliente" placeholder="Cliente">
        <input class="municipio" placeholder="Município">
        <input class="vendedor" placeholder="Vendedor">
      </div>
    `;
  });

});

/* ===== SALVAR ===== */
btnSalvar.addEventListener("click",async()=>{

  btnSalvar.disabled=true;
  loaderBtn.classList.remove("hidden");
  textoBtn.innerText="Salvando...";

  try{

    if(!tipoCaminhaoAtual) throw "Selecione o tipo de veículo.";

    const dataInput=document.getElementById("dataCarregamento").value;
    if(!dataInput) throw "Informe a data.";

    const linhas=document.querySelectorAll(".compartimento");
    if(linhas.length===0) throw "Compartimentos não gerados.";

    let preenchidos=0;
    let compartimentos=[];

    linhas.forEach(l=>{
      const cap=l.querySelector(".capacidade").innerText.replace(/\D/g,"");
      const cliente=l.querySelector(".cliente").value.trim();
      const municipio=l.querySelector(".municipio").value.trim();
      const vendedor=l.querySelector(".vendedor").value.trim();

      if(cliente&&municipio&&vendedor) preenchidos++;

      compartimentos.push({
        capacidade:Number(cap),
        cliente,
        municipio,
        vendedor
      });
    });

    if(preenchidos<2) throw "Preencha ao menos 2 compartimentos.";

    const dataBase = document.getElementById("dataCarregamento").value;
const snap = await getDocs(collection(db,"programacao_cargas"));

let ultimoNumero = 0;

snap.forEach(docSnap => {
  const numero = parseInt(docSnap.data().numeroCarga);
  if (!isNaN(numero) && numero > ultimoNumero) {
    ultimoNumero = numero;
  }
});

const numeroCarga = String(ultimoNumero + 1).padStart(4,"0");

    await addDoc(collection(db,"programacao_cargas"),{
      numeroCarga,
      dataCarregamento:new Date(dataInput + "T12:00:00"),
      dataReferencia: dataInput,
      horarioPrevisto:document.getElementById("horarioPrevisto").value,
      tipoCaminhao:tipoCaminhaoAtual,
      capacidadeTotal:capacidadeTotalAtual,
      placa:null,
      status:"AGUARDANDO_FILA",
      compartimentos,
      observacoes: document.getElementById("observacoes").value,
      criadoEm:serverTimestamp()
      
    });

    location.reload();

  }catch(e){
    alert(e);
  }

  btnSalvar.disabled=false;
  loaderBtn.classList.add("hidden");
  textoBtn.innerText="Salvar Carga";
});

/* ===== AUTENTICAÇÃO + TABELA ===== */
function carregarTabela() {

onSnapshot(
  collection(db,"programacao_cargas"),
  snap => {

    tabela.innerHTML="";

    if (snap.empty) {
      tabela.innerHTML="<tr><td colspan='7'>Nenhuma carga encontrada</td></tr>";
      return;
    }

    snap.forEach(docSnap=>{
      const c=docSnap.data();

      tabela.innerHTML+=`
     <tr class="linha-status status-${c.status}">
        <td>${c.numeroCarga}</td>
        <td>${
          c.dataCarregamento?.toDate 
            ? c.dataCarregamento.toDate().toLocaleDateString() 
            : new Date(c.dataCarregamento).toLocaleDateString()
        }</td>
        <td>${c.placa||"-"}</td>
        <td>${c.tipoCaminhao}</td>
        <td>${c.capacidadeTotal?.toLocaleString()} L</td>
        <td>
  <span class="status-badge status-${c.status}">
    ${c.status === "PROGRAMADO" ? "🟢 PROGRAMADO" : "🟡 AGUARDANDO FILA"}
  </span>
</td>
        <td>
  <div class="col-acoes">

    <button class="btn btn-azul" onclick="toggleDetalhe('${docSnap.id}')">
      👁 Ver
    </button>

    <button class="btn btn-vincular" onclick="vincular('${docSnap.id}')">
      ${c.placa ? "Alterar" : "Vincular"}
    </button>

    ${c.placa ? `
      <button class="btn btn-warning"
        onclick="voltarFila('${docSnap.id}')">
        ↩ Fila
      </button>
    ` : ""}

    <button class="btn btn-excluir"
      onclick="excluirCarga('${docSnap.id}')">
      Excluir
    </button>

  </div>
</td>
      </tr>`;
    });

  },
  error => {
    console.error("Erro ao ler cargas:", error);
  }
);

}

/* ===== MODAL ===== */
function abrirModal(titulo,conteudo,acao){
  document.getElementById("modalTitulo").innerText=titulo;
  document.getElementById("modalConteudo").innerHTML=conteudo;
  document.getElementById("btnConfirmarModal").onclick=acao;
  document.getElementById("modalOverlay").style.display="flex";
}

function fecharModal(){
  document.getElementById("modalOverlay").style.display="none";
}

function vincular(id){

  abrirModal(
    "Vincular Caminhão",
    `<input id="placaModal" placeholder="Digite a placa" style="width:100%;padding:8px;">`,
    async()=>{

      const placa = document.getElementById("placaModal").value.trim().toUpperCase();
      if(!placa) return;

      try{

        // 1️⃣ Buscar carga
        const cargaRef = doc(db,"programacao_cargas",id);
        const cargaSnap = await getDoc(cargaRef);
        const carga = cargaSnap.data();

        // 2️⃣ Buscar caminhão
        const motoristaRef = doc(db,"motoristas_cadastro",placa);
        const motoristaSnap = await getDoc(motoristaRef);

        if(!motoristaSnap.exists()){
          alert("Placa não cadastrada no sistema.");
          return;
        }

        const motorista = motoristaSnap.data();

        // ===== VALIDAÇÃO POR CAPACIDADE TOTAL =====
        if (capacidadeCaminhao < carga.capacidadeTotal) {

          alert(`❌ Capacidade insuficiente!

Carga: ${carga.capacidadeTotal.toLocaleString()} L
Caminhão: ${motorista.capacidadeTotal.toLocaleString()} L`);

          return;
        }

        // ===== VALIDAÇÃO POR DISTRIBUIÇÃO REAL =====
        function podeDistribuir(volumesCarga, compartimentosCaminhao){

          let disponiveis = [...compartimentosCaminhao];

          for(let volume of volumesCarga){

            let encaixou = false;

            for(let i=0; i<disponiveis.length; i++){

              if(disponiveis[i] >= volume){
                disponiveis[i] -= volume;
                encaixou = true;
                break;
              }

            }

            if(!encaixou) return false;
          }

          return true;
        }

        const volumesCarga = carga.compartimentos
          .filter(c => c.cliente)
          .map(c => c.capacidade);

// Extrai apenas a parte numérica antes do "-"
const configNumerica = motorista.configEixos.split("-")[0];

// Gera compartimentos reais
const compartimentosCaminhao = configNumerica
  .split("")
  .map(n => Number(n) * 1000);

// Calcula capacidade automaticamente
const capacidadeCaminhao = compartimentosCaminhao.reduce((a,b)=>a+b,0);

        if(!podeDistribuir(volumesCarga, compartimentosCaminhao)){

          alert(`❌ Distribuição incompatível!

Os volumes da carga não encaixam
nos compartimentos do caminhão.`);

          return;
        }

        // 3️⃣ Se passou na validação
        await updateDoc(cargaRef,{
          placa:placa,
          status:"PROGRAMADO"
        });

        fecharModal();

      }catch(error){
        console.error(error);
        alert("Erro ao vincular caminhão.");
      }

    }
  );

}
  function voltarFila(id){
  abrirModal(
    "Retornar carga para fila",
    "<p>Deseja remover a placa e retornar para Aguardando Fila?</p>",
    async()=>{
      await updateDoc(doc(db,"programacao_cargas",id),{
        placa: null,
        status:"AGUARDANDO_FILA"
      });
      fecharModal();
    }
  );
}

window.voltarFila = voltarFila;
function toggleDetalhe(id){

  const existente = document.getElementById("detalhe-"+id);
  if(existente){
    existente.remove();
    return;
  }

  const docRef = doc(db,"programacao_cargas",id);

  getDoc(docRef).then(docSnap=>{

    const c = docSnap.data();

    const linha = document.createElement("tr");
    linha.id="detalhe-"+id;
    linha.className="detalhe-linha";

    let itensHTML="";

    c.compartimentos.forEach(comp=>{
      if(comp.cliente || comp.municipio || comp.vendedor){

        itensHTML += `
          <div class="detalhe-item">
            <div>${comp.cliente || "-"}</div>
            <div>${comp.municipio || "-"}</div>
            <div class="volume-destaque">${comp.capacidade.toLocaleString()} L</div>
            <div>${comp.vendedor || "-"}</div>
          </div>
        `;
      }
    });

linha.innerHTML = `
  <td colspan="7">
    <div class="detalhe-container">

      <div class="detalhe-header">
        CÁLCULO DA CARGA – ${c.numeroCarga} • ${c.tipoCaminhao}
      </div>

      <div style="
        padding:10px 20px;
        background:#f1f5f9;
        font-size:13px;
        display:flex;
        justify-content:space-between;
        flex-wrap:wrap;
        gap:10px;
      ">
        <div><strong>Status:</strong> ${c.status}</div>
        <div>
          <strong>Placa:</strong> 
          ${c.placa ? c.placa : '<span style="color:#b91c1c;font-weight:600;">Aguardando Veículo</span>'}
        </div>
        <div><strong>Total:</strong> ${c.capacidadeTotal?.toLocaleString()} L</div>
      </div>

      <div class="detalhe-colunas">
        <div>Cliente</div>
        <div>Município</div>
        <div>Volume</div>
        <div>Vendedor</div>
      </div>

      ${itensHTML}

      ${c.observacoes ? `
        <div style="
          padding:15px 20px;
          background:#fff7ed;
          border-top:1px solid #e5e7eb;
          font-size:13px;
        ">
          <strong>Observações:</strong><br>
          ${c.observacoes}
        </div>
      ` : ""}

    </div>
  </td>
`;

    const linhasTabela = [...tabela.querySelectorAll("tr")];
    const linhaPrincipal = linhasTabela.find(tr => tr.innerHTML.includes(id));
    linhaPrincipal.after(linha);

  });

}
function excluirCarga(id){
  abrirModal(
    "Excluir Carga",
    "<p>Deseja realmente excluir?</p>",
    async()=>{
      await deleteDoc(doc(db,"programacao_cargas",id));
      fecharModal();
    }
  );
}

window.vincular=vincular;
window.excluirCarga=excluirCarga;
window.fecharModal=fecharModal;
window.toggleDetalhe = toggleDetalhe;
  
onAuthStateChanged(auth, async (user) => {

  if (user) {
    console.log("Usuário autenticado:", user.email);
    carregarTabela();
  } else {

    // Aguarda um pequeno tempo para o Firebase restaurar a sessão
    setTimeout(() => {

      const currentUser = auth.currentUser;

      if (currentUser) {
        console.log("Sessão restaurada:", currentUser.email);
        carregarTabela();
      } else {
        console.log("Sem sessão ativa.");
      }

    }, 500);

  }

});
  const hoje = new Date();
const yyyy = hoje.getFullYear();
const mm = String(hoje.getMonth() + 1).padStart(2, '0');
const dd = String(hoje.getDate()).padStart(2, '0');

document.getElementById("dataCarregamento").value = `${yyyy}-${mm}-${dd}`;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Programação de Cargas | ERP Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#0A3D91;
  --vermelho:#dc2626;
  --cinza:#f1f5f9;
}
body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--cinza);
}
header{
  background:linear-gradient(90deg,var(--azul),var(--vermelho));
  color:#fff;
  padding:25px;
  text-align:center;
}
main{
  padding:40px;
  max-width:1300px;
  margin:auto;
}
.card-form{
  background:#fff;
  padding:25px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}
.linha-topo,.linha-bottom{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
  margin-bottom:15px;
}
input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
.info-veiculo{
  background:#f1f5f9;
  padding:12px;
  border-radius:10px;
  font-weight:600;
  margin-bottom:15px;
  display:none;
}
.compartimento{
  background:#f8fafc;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:grid;
  grid-template-columns:120px 1fr 1fr 1fr;
  gap:10px;
}
.capacidade{
  font-weight:700;
  color:var(--azul);
}
.btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}
.btn-azul{ background:var(--azul); color:#fff; }
.btn-vincular{ background:#198754; color:#fff; }
.btn-excluir{ background:#dc2626; color:#fff; }
.loader{
  width:16px;
  height:16px;
  border:3px solid rgba(255,255,255,0.4);
  border-top:3px solid #fff;
  border-radius:50%;
  display:inline-block;
  margin-left:8px;
  animation:spin .7s linear infinite;
}
.hidden{ display:none !important; }
@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}
.table-wrap{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  margin-top:30px;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:14px;
  border-bottom:1px solid #eee;
  text-align:center;
}
th{
  background:var(--azul);
  color:#fff;
}
.status{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}
.PROGRAMADO{ background:#cfe2ff; color:#084298; }
.AGUARDANDO_FILA{ background:#fff3cd; color:#664d03; }

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.modal-box{
  background:#fff;
  width:400px;
  max-width:90%;
  padding:25px;
  border-radius:14px;
}
.modal-actions{
  margin-top:20px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}
</style>
</head>
<body>

<header>
<h1>📦 Programação de Cargas</h1>
<p>Módulo Operacional Integrado</p>
</header>

<main>

<div class="card-form">

<div class="linha-topo">
<input type="date" id="dataCarregamento">
<input type="time" id="horarioPrevisto">
<select id="tipoVeiculo">
<option value="">Selecione Tipo</option>
<option value="5532 - Truck">5532 - Truck</option>
<option value="612 - Bitrem">612 - Bitrem</option>
</select>
</div>

<div class="info-veiculo" id="infoVeiculo"></div>
<div id="containerCompartimentos"></div>

<div class="linha-bottom">
<input type="number" id="km" placeholder="KM">
<input type="text" id="observacoes" placeholder="Observações">
</div>

<button class="btn btn-azul" id="btnSalvar">
<span id="textoBtn">Salvar Carga</span>
<span id="loaderBtn" class="loader hidden"></span>
</button>

</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Nº</th>
<th>Data</th>
<th>Placa</th>
<th>Tipo</th>
<th>Total L</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabelaCargas"></tbody>
</table>
</div>

</main>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay">
  <div class="modal-box">
    <h3 id="modalTitulo"></h3>
    <div id="modalConteudo"></div>
    <div class="modal-actions">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-azul" id="btnConfirmarModal">Confirmar</button>
    </div>
  </div>
</div>

<script type="module">

/* ===== IMPORTS (APENAS UMA VEZ) ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  doc, 
  getDocs, 
  updateDoc, 
  deleteDoc, 
  onSnapshot, 
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ===== FIREBASE INIT ===== */
const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"tabela-frete-rio-branco.firebaseapp.com",
  projectId:"tabela-frete-rio-branco"
});

const db = getFirestore(app);
const auth = getAuth(app);

setPersistence(auth, browserLocalPersistence);

/* ===== VARIÁVEIS ===== */
let tipoCaminhaoAtual="";
let capacidadeTotalAtual=0;

const infoVeiculo=document.getElementById("infoVeiculo");
const container=document.getElementById("containerCompartimentos");
const tabela=document.getElementById("tabelaCargas");
const btnSalvar=document.getElementById("btnSalvar");
const textoBtn=document.getElementById("textoBtn");
const loaderBtn=document.getElementById("loaderBtn");

/* ===== GERAR COMPARTIMENTOS ===== */
document.getElementById("tipoVeiculo").addEventListener("change",e=>{
const valor=e.target.value;
if(!valor){
tipoCaminhaoAtual="";
container.innerHTML="";
infoVeiculo.style.display="none";
return;
}

const [numeros,tipo]=valor.split(" - ");
tipoCaminhaoAtual=tipo;

const compartimentos=numeros.split("").map(n=>Number(n)*1000);
capacidadeTotalAtual=compartimentos.reduce((a,b)=>a+b,0);

infoVeiculo.style.display="block";
infoVeiculo.innerHTML=`🚛 ${tipo} • ${capacidadeTotalAtual.toLocaleString()} L`;

container.innerHTML="";
compartimentos.forEach(cap=>{
container.innerHTML+=`
<div class="compartimento">
<div class="capacidade">${cap.toLocaleString()} L</div>
<input class="cliente" placeholder="Cliente">
<input class="municipio" placeholder="Município">
<input class="vendedor" placeholder="Vendedor">
</div>`;
});
});

/* ===== SALVAR CARGA ===== */
btnSalvar.addEventListener("click",async()=>{
btnSalvar.disabled=true;
loaderBtn.classList.remove("hidden");
textoBtn.innerText="Salvando...";

try{

if(!tipoCaminhaoAtual) throw "Selecione o tipo de veículo.";

const dataInput=document.getElementById("dataCarregamento").value;
if(!dataInput) throw "Informe a data.";

const linhas=document.querySelectorAll(".compartimento");
if(linhas.length===0) throw "Compartimentos não gerados.";

let preenchidos=0;
let compartimentos=[];

linhas.forEach(l=>{
const cap=l.querySelector(".capacidade").innerText.replace(/\D/g,"");
const cliente=l.querySelector(".cliente").value.trim();
const municipio=l.querySelector(".municipio").value.trim();
const vendedor=l.querySelector(".vendedor").value.trim();
if(cliente&&municipio&&vendedor) preenchidos++;
compartimentos.push({capacidade:Number(cap),cliente,municipio,vendedor});
});

if(preenchidos<2) throw "Preencha ao menos 2 compartimentos.";

const base=new Date().toISOString().slice(0,10).replaceAll("-","");
const snap=await getDocs(collection(db,"programacao_cargas"));
const contador=snap.docs.filter(d=>d.data().numeroCarga?.startsWith(base)).length+1;
const numeroCarga=`${base}-${String(contador).padStart(3,"0")}`;

await addDoc(collection(db,"programacao_cargas"),{
numeroCarga,
dataCarregamento:new Date(dataInput),
horarioPrevisto:document.getElementById("horarioPrevisto").value,
tipoCaminhao:tipoCaminhaoAtual,
capacidadeTotal:capacidadeTotalAtual,
placa:null,
status:"PROGRAMADO",
compartimentos,
criadoEm:serverTimestamp()
});

alert("Carga criada com sucesso!");
location.reload();

}catch(e){
alert(e);
}

btnSalvar.disabled=false;
loaderBtn.classList.add("hidden");
textoBtn.innerText="Salvar Carga";
});

/* ===== CARREGAR TABELA ===== */
onSnapshot(collection(db,"programacao_cargas"),snap=>{
tabela.innerHTML="";
snap.forEach(docSnap=>{
const c=docSnap.data();
tabela.innerHTML+=`
<tr>
<td>${c.numeroCarga}</td>
<td>${c.dataCarregamento?.toDate().toLocaleDateString()}</td>
<td>${c.placa||"-"}</td>
<td>${c.tipoCaminhao}</td>
<td>${c.capacidadeTotal?.toLocaleString()} L</td>
<td><span class="status ${c.status}">${c.status}</span></td>
<td>${c.status==="PROGRAMADO" ? `
<button class="btn btn-vincular" onclick="vincular('${docSnap.id}')">Vincular</button>
<button class="btn btn-excluir" onclick="excluirCarga('${docSnap.id}')">Excluir</button>
` : "-"}
</td>
</tr>`;
});
});

/* ===== MODAL ===== */
window.abrirModal=function(titulo,conteudo,acao){
document.getElementById("modalTitulo").innerText=titulo;
document.getElementById("modalConteudo").innerHTML=conteudo;
document.getElementById("btnConfirmarModal").onclick=acao;
document.getElementById("modalOverlay").style.display="flex";
}
window.fecharModal=function(){
document.getElementById("modalOverlay").style.display="none";
}
window.vincular=function(id){
abrirModal("Vincular Caminhão",
`<input id="placaModal" placeholder="Digite a placa" style="width:100%;padding:8px;">`,
async()=>{
const placa=document.getElementById("placaModal").value.trim();
if(!placa) return;
await updateDoc(doc(db,"programacao_cargas",id),{
placa:placa.toUpperCase(),
status:"AGUARDANDO_FILA"
});
fecharModal();
});
}
window.excluirCarga=function(id){
abrirModal("Excluir Carga",
"<p>Deseja realmente excluir?</p>",
async()=>{
await deleteDoc(doc(db,"programacao_cargas",id));
fecharModal();
});
}
</script>

</body>
</html>

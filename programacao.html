<style>
:root{
  --azul:#0A3D91;
  --vermelho:#dc2626;
  --cinza:#f1f5f9;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--cinza);
}

header{
  background:linear-gradient(90deg,var(--azul),var(--vermelho));
  color:#fff;
  padding:12px 20px;   /* 👈 reduz altura */
  text-align:center;
}

header h1{
  margin:0;
  font-size:20px;      /* 👈 menor */
  font-weight:600;
}

header p{
  margin:4px 0 0 0;
  font-size:12px;      /* 👈 mais compacto */
  opacity:.9;
}

main{
  padding:40px;
  max-width:1300px;
  margin:auto;
}

/* CARD FORM */
.card-form{
  background:#fff;
  padding:25px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.linha-topo,.linha-bottom{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
  margin-bottom:15px;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.info-veiculo{
  background:#f1f5f9;
  padding:12px;
  border-radius:10px;
  font-weight:600;
  margin-bottom:15px;
  display:none;
}
  .cabecalho-compartimentos{
  display:grid;
  grid-template-columns:120px 1fr 1fr 110px 140px 150px 1fr;
  gap:10px;
  padding:8px 12px;
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.5px;
  color:#64748b;
  background:#f8fafc;
  border-radius:8px;
  margin-bottom:8px;
}

.compartimento{
  background:#f8fafc;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:grid;
  grid-template-columns:120px 1fr 1fr 110px 140px 150px 1fr;
  gap:10px;
  align-items:center;
}

.capacidade{
  font-weight:700;
  color:var(--azul);
}

/* BOTÕES */
.btn{
  padding:5px 10px;
  font-size:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-azul{ background:var(--azul); color:#fff; }
.btn-vincular{ background:#198754; color:#fff; }
.btn-excluir{ background:#dc2626; color:#fff; }
.btn-warning{ background:#f59e0b; color:#fff; }

/* LOADER */
.loader{
  width:16px;
  height:16px;
  border:3px solid rgba(255,255,255,0.4);
  border-top:3px solid #fff;
  border-radius:50%;
  display:inline-block;
  margin-left:8px;
  animation:spin .7s linear infinite;
}

.hidden{ display:none !important; }

@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

/* TABELA */
.table-wrap{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  margin-top:30px;
}
  .linha-grupo td{
  border-top:14px solid #f1f5f9;
}

.linha-grupo:first-of-type td{
  border-top:18px solid #e2e8f0;
}
thead{
  background:linear-gradient(90deg,#0d47a1,#0a3d91);
  color:#fff;
  font-weight:600;
  letter-spacing:.5px;
  position:relative;
}

thead::after{
  content:"";
  position:absolute;
  bottom:-8px;
  left:0;
  width:100%;
  height:8px;
  background:linear-gradient(to bottom,rgba(0,0,0,.08),transparent);
}
table{
  width:100%;
  border-collapse:collapse;
}

th{
  color:#fff;
 padding:12px;
  font-size:13px;
  text-align:center;
}
  th:last-child{
  text-align:right;   /* 🔥 só a coluna Ação */
  padding-right:20px;
}
  td:last-child{
  text-align:right;
  padding-right:20px;
}

td{
  padding:8px 10px;   /* mais compacto */
  font-size:13px;     /* ligeiramente menor */
  border-bottom:1px solid #f1f5f9;
  text-align:center;
}

/* STATUS BADGE */
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
   padding:4px 10px;
  font-size:11px;
  border-radius:20px;
  font-weight:600;
  letter-spacing:.5px;
  transition:all .3s ease;
  white-space:nowrap;   /* 🔥 impede quebra */
}

.status-AGUARDANDO_FILA{
  background:#fef3c7;
  color:#92400e;
  border:1px solid #fde68a;
}

.status-PROGRAMADO{
  background:#dcfce7;
  color:#166534;
  border:1px solid #86efac;
}

/* TONALIDADE SUAVE NA LINHA */
.linha-status td{
  transition: background .25s ease;
}

.linha-status.status-AGUARDANDO_FILA td{
  background:#fffbeb;
}

.linha-status.status-PROGRAMADO td{
  background:#f0fdf4;
}

/* HOVER SUAVE */
.linha-status:hover td{
  background:#f8fafc;
}

/* COLUNA AÇÕES */
.col-acoes{
  display:flex;
  gap:6px;
  justify-content:flex-end;   /* 🔥 joga tudo pra direita */
  align-items:center;
  flex-wrap:wrap;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  background:#fff;
  width:400px;
  max-width:90%;
  padding:25px;
  border-radius:14px;
}

.modal-actions{
  margin-top:20px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

/* DETALHE EXPANDIDO */
.detalhe-linha td{

}

.detalhe-container{

}

.detalhe-header{
  background:linear-gradient(90deg,#0A3D91,#1e3a8a);

  padding:12px 20px;
  font-weight:600;
  font-size:14px;
}

.detalhe-colunas{
  text-align:center;
  background:#e2e8f0;
  display:grid;
  grid-template-columns:2fr 2fr 1fr 1.3fr 1.3fr 1fr;
  padding:6px 20px;
  font-weight:600;
  font-size:12px;
  text-transform:uppercase;

.detalhe-item{
  text-align:center;
  display:grid;
  grid-template-columns:2fr 2fr 1fr 1.3fr 1.3fr 1fr;

  font-size:14px;
  align-items:center;
  line-height:1.2;
}

.detalhe-item:nth-child(even){
  background:#f8fafc;
}

.volume-destaque{
  font-weight:700;
  color:#0A3D91;

  .campo{

.campo label{

  display:flex;
  align-items:center;
  gap:6px;
}

.icon{

}
  .status-FATURADO{

}
  input[type="text"]{

}
.campo-calculado{
  background:#eef2f7 !important;

  color:#0A3D91;

}
  .campo-calculado:focus{
  outline:none;
  box-shadow:none;
  cursor:default;
}
/* 🔥 EFEITO PULSE - NOVA CARGA */

.linha-nova td{
  animation: pulseNovaCarga 2s ease-in-out 3;
}

@keyframes pulseNovaCarga{
  0%{
    box-shadow: inset 0 0 0 0 rgba(37, 99, 235, 0.4);
    background:#e0f2fe;
  }
  50%{
    box-shadow: inset 0 0 0 6px rgba(37, 99, 235, 0.25);
    background:#bfdbfe;
  }
  100%{
    box-shadow: inset 0 0 0 0 rgba(37, 99, 235, 0);
    background:inherit;
  }
}

@keyframes destaqueNovaCarga{
  0%{
    background:#dbeafe;
    transform:scale(1.01);
  }
  40%{
    background:#bfdbfe;
  }
  100%{
    background:inherit;
    transform:scale(1);
  }
}
</style>

  document.getElementById("km").addEventListener("input", calcularFreteRota);

function calcularFreteRota(){

  const km = parseFloat(document.getElementById("km").value);

  if(!km || !indiceAtual){
    document.getElementById("freteTotalRota").value = "";
    document.getElementById("freteUnitarioMedio").value = "";
    return;
  }

  const freteTotal = (km * indiceAtual) + taxaAtual;

  // 🔥 Atualiza Frete Total
  document.getElementById("freteTotalRota").value =
    freteTotal.toLocaleString("pt-BR",{
      style:"currency",
      currency:"BRL"
    });

  // 🔥 Calcula Frete Unitário Médio
  if(capacidadeTotalAtual > 0){

    const freteUnitMedio = freteTotal / capacidadeTotalAtual;

    document.getElementById("freteUnitarioMedio").value =
      freteUnitMedio.toFixed(4);

    distribuirFreteAutomatico(freteUnitMedio);
  }
}

  function distribuirFreteAutomatico(valorUnitario){

  document.querySelectorAll(".compartimento").forEach(linha => {

    const volume = Number(
      linha.querySelector(".capacidade").innerText.replace(/\D/g,"")
    );

    const freteInput = linha.querySelector(".freteUnitario");
    const totalInput = linha.querySelector(".totalLinha");

    // 🔥 Preenche frete unitário
    freteInput.value = valorUnitario.toFixed(4);

    // 🔥 Calcula total da linha
    const total = volume * valorUnitario;

    totalInput.value = total.toLocaleString("pt-BR",{
      style:"currency",
      currency:"BRL"
    });

  });

}

  function resetarFretes(){

  document.getElementById("km").value = "";
  document.getElementById("freteTotalRota").value = "";
  document.getElementById("freteUnitarioMedio").value = "";

  document.querySelectorAll(".freteUnitario").forEach(input=>{
    input.value = "";
  });

  document.querySelectorAll(".totalLinha").forEach(input=>{
    input.value = "";
  });

}
  function aplicarRateioAutomatico(){

  const freteTotalTexto = document.getElementById("freteTotalRota").value;

  if(!freteTotalTexto) return;

  const freteTotal = parseFloat(
    freteTotalTexto.replace(/\./g,"").replace(",",".").replace("R$","")
  );

  const linhas = document.querySelectorAll(".compartimento");

  let totalVolume = 0;
  let totalJaDistribuido = 0;

  linhas.forEach(linha=>{
    const volume = Number(
      linha.querySelector(".capacidade").innerText.replace(/\D/g,"")
    );

    const frete = parseFloat(linha.querySelector(".freteUnitario").value) || 0;

    totalVolume += volume;
    totalJaDistribuido += volume * frete;
  });

  const diferenca = freteTotal - totalJaDistribuido;

  if(Math.abs(diferenca) < 0.01) return;

  const volumeTotal = totalVolume;

  linhas.forEach(linha=>{

    const volume = Number(
      linha.querySelector(".capacidade").innerText.replace(/\D/g,"")
    );

    const freteInput = linha.querySelector(".freteUnitario");
    const totalInput = linha.querySelector(".totalLinha");

    let freteAtual = parseFloat(freteInput.value) || 0;

    const ajuste = (volume / volumeTotal) * diferenca;

    const novoFreteTotalLinha = (volume * freteAtual) + ajuste;
    const novoFreteUnit = novoFreteTotalLinha / volume;

    freteInput.value = novoFreteUnit.toFixed(4);

    totalInput.value = novoFreteTotalLinha.toLocaleString("pt-BR",{
      style:"currency",
      currency:"BRL"
    });

  });

}
/* ===== GERAR COMPARTIMENTOS ===== */
document.getElementById("tipoVeiculo").addEventListener("change", e => {

  const valor = e.target.value;

if(tipoBase.startsWith("TRUCK")) {

} else {

}

`;

      <input class="vendedor" placeholder="Vendedor" style="text-transform:uppercase;">

  `;
});
  
  document.querySelectorAll(".compartimento").forEach(linha => {

aplicarRateioAutomatico();

async function vincular(id){

  try{

    // 🔥 Buscar todos motoristas cadastrados
    const snapMotoristas = await getDocs(collection(db,"motoristas_cadastro"));

    if(snapMotoristas.empty){
      abrirModal(
        "Nenhum caminhão cadastrado",
        "<p>Cadastre um caminhão primeiro.</p>",
        ()=>{ fecharModal(); }
      );
      return;
    }

    let optionsHTML = `<option value="">Selecione a placa</option>`;

    snapMotoristas.forEach(docSnap=>{
      const m = docSnap.data();
      optionsHTML += `
        <option value="${docSnap.id}">
          ${docSnap.id} - ${m.nome || "Motorista"} (${m.configEixos})
        </option>
      `;
    });

    abrirModal(
      "Vincular Caminhão",
      `
      <select id="placaModal" style="width:100%;padding:10px;">
        ${optionsHTML}
      </select>
      `,
      async()=>{

        const placa = document.getElementById("placaModal").value;
        if(!placa) return;

        try{

          // 1️⃣ Buscar carga
          const cargaRef = doc(db,"programacao_cargas",id);
          const cargaSnap = await getDoc(cargaRef);

          if(!cargaSnap.exists()){
            fecharModal();
            return;
          }

          const carga = cargaSnap.data();

          // 2️⃣ Buscar caminhão selecionado
          const motoristaRef = doc(db,"motoristas_cadastro",placa);
          const motoristaSnap = await getDoc(motoristaRef);

          if(!motoristaSnap.exists()){
            fecharModal();
            return;
          }

          const motorista = motoristaSnap.data();

          const configNumerica = motorista.configEixos.split("-")[0];

          const compartimentosCaminhao = configNumerica
            .split("")
            .map(n => Number(n) * 1000);

          const capacidadeCaminhao = compartimentosCaminhao
            .reduce((a,b)=>a+b,0);

          // 🔥 VALIDAÇÃO CAPACIDADE
          if (capacidadeCaminhao < carga.capacidadeTotal) {

            abrirModal(
              "Capacidade Insuficiente",
              `
              <p><strong>Carga:</strong> ${carga.capacidadeTotal.toLocaleString()} L</p>
              <p><strong>Caminhão:</strong> ${capacidadeCaminhao.toLocaleString()} L</p>
              `,
              ()=>{ fecharModal(); }
            );

            return;
          }

          // 🔥 Atualiza carga
          await updateDoc(cargaRef,{
            placa:placa,
            status:"PROGRAMADO"
          });
          // 🔥 REMOVE DA FILA
await deleteDoc(doc(db,"fila",placa));

          fecharModal();

        }catch(error){
          console.error(error);
        }

      }
    );

  }catch(error){
    console.error(error);
  }

}

function formatarObservacoes(texto){

  if(!texto) return "";

  const urlRegex = /(https?:\/\/[^\s]+)/gi;

  return texto.replace(urlRegex, function(url){

    const urlLower = url.toLowerCase();

    const isGoogleMaps =
      urlLower.includes("google.com/maps") ||
      urlLower.includes("maps.app.goo.gl") ||
      urlLower.includes("goo.gl/maps");

    if(isGoogleMaps){

      return `
        <div style="margin-top:8px;">
          <a href="${url}" 
             target="_blank" 
             style="
               display:inline-flex;
               align-items:center;
               gap:8px;
               background:linear-gradient(90deg,#0A3D91,#2563eb);
               color:#fff;
               padding:10px 18px;
               border-radius:30px;
               text-decoration:none;
               font-weight:600;
               font-size:13px;
               box-shadow:0 6px 18px rgba(0,0,0,.15);
               transition:all .2s ease;
             "
             onmouseover="this.style.transform='scale(1.05)'"
             onmouseout="this.style.transform='scale(1)'"
          >
            🗺️ Abrir Rota no Google Maps
          </a>
        </div>
      `;
    }

    return `
      <div style="margin-top:8px;">
        <a href="${url}" 
           target="_blank"
           style="color:#2563eb;font-weight:600;">
          🔗 Abrir Link
        </a>
      </div>
    `;
  });

}

async function gerarNumeroCargaSeguro(){

  const contadorRef = doc(db, "configuracoes", "contador_cargas");

  return await runTransaction(db, async (transaction) => {

    const contadorDoc = await transaction.get(contadorRef);

    if (!contadorDoc.exists()) {
      throw "Documento contador_cargas não existe.";
    }

    const numeroAtual = contadorDoc.data().ultimoNumero || 0;

    const novoNumero = numeroAtual + 1;

    transaction.update(contadorRef, {
      ultimoNumero: novoNumero
    });

    return String(novoNumero).padStart(4,"0");

  });

}

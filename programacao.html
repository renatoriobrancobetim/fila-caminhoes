<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Programação de Cargas | ERP Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#0A3D91;
  --vermelho:#dc2626;
  --cinza:#f1f5f9;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--cinza);
}

header{
  background:linear-gradient(90deg,var(--azul),var(--vermelho));
  color:#fff;
  padding:25px;
  text-align:center;
}

main{
  padding:40px;
  max-width:1300px;
  margin:auto;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-bottom:20px;
}

input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

.btn{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-azul{ background:var(--azul); color:#fff; }

.table-wrap{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  margin-top:30px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  border-bottom:1px solid #eee;
  text-align:center;
  font-size:14px;
}

th{
  background:var(--azul);
  color:#fff;
}

.status{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.loader{
  width:16px;
  height:16px;
  border:3px solid rgba(255,255,255,0.4);
  border-top:3px solid #fff;
  border-radius:50%;
  display:inline-block;
  margin-left:8px;
  animation:spin .7s linear infinite;
}

.hidden{ display:none; }

@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

.PROGRAMADO{ background:#cfe2ff; color:#084298; }
</style>
</head>

<body>

<header>
<h1>📦 Programação de Cargas</h1>
<p>Módulo Operacional Integrado</p>
</header>

<main>

<h2>Nova Carga</h2>

<div class="form-grid">
  <input type="date" id="dataCarregamento">
  <input type="text" id="vendedor" placeholder="Vendedor">
  <input type="text" id="cliente" placeholder="Cliente">
  <input type="text" id="municipio" placeholder="Município">
  <input type="text" id="tipoCaminhao" placeholder="Tipo Caminhão">
  <input type="number" id="volume" placeholder="Volume">
  <input type="number" id="freteUnitario" placeholder="Frete Unitário">
  <input type="number" id="total" placeholder="Total">
  <input type="time" id="horarioPrevisto">
  <input type="text" id="placa" placeholder="Placa">
  <input type="number" id="km" placeholder="KM">
  <input type="text" id="observacoes" placeholder="Observações">
</div>

<button class="btn btn-azul" id="btnSalvar">
  <span id="textoBtn">Salvar Carga</span>
  <span id="loaderBtn" class="loader hidden"></span>
</button>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Cliente</th>
        <th>Município</th>
        <th>Placa</th>
        <th>Motorista</th>
        <th>Volume</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tabelaCargas"></tbody>
  </table>
</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  getDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKdfOvWehaJcuK6uX5JXxc7YdN26h8sXY",
  authDomain: "tabela-frete-rio-branco.firebaseapp.com",
  projectId: "tabela-frete-rio-branco"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const tabela = document.getElementById("tabelaCargas");

/* 🔐 PROTEGER PÁGINA */
onAuthStateChanged(auth,user=>{
  if(!user){
    window.location.href="login.html";
    return;
  }
  carregarCargas();
});

/* 📥 SALVAR CARGA */
const btnSalvar = document.getElementById("btnSalvar");
const textoBtn = document.getElementById("textoBtn");
const loaderBtn = document.getElementById("loaderBtn");

btnSalvar.addEventListener("click", async ()=>{

  btnSalvar.disabled = true;
  textoBtn.innerText = "Salvando...";
  loaderBtn.classList.remove("hidden");

  try{

    const placa = document.getElementById("placa").value.toUpperCase();

    const cadastroSnap = await getDoc(doc(db,"motoristas_cadastro",placa));

    if(!cadastroSnap.exists()){
      alert("Placa não cadastrada!");
      resetBtn();
      return;
    }

    const dadosPlaca = cadastroSnap.data();

    await addDoc(collection(db,"programacao_cargas"),{
      dataCarregamento: new Date(document.getElementById("dataCarregamento").value),
      vendedor: document.getElementById("vendedor").value,
      cliente: document.getElementById("cliente").value,
      municipio: document.getElementById("municipio").value,
      tipoCaminhao: document.getElementById("tipoCaminhao").value,
      volume: Number(document.getElementById("volume").value),
      freteUnitario: Number(document.getElementById("freteUnitario").value),
      total: Number(document.getElementById("total").value),
      horarioPrevisto: document.getElementById("horarioPrevisto").value,
      observacoes: document.getElementById("observacoes").value,
      placa,
      motorista: dadosPlaca.motorista || "",
      configEixos: dadosPlaca.configEixos || "",
      capacidade: dadosPlaca.capacidade || 0,
      transportadora: dadosPlaca.transportadora || "",
      plotado: dadosPlaca.plotado || false,
      km: Number(document.getElementById("km").value) || 0,
      status:"PROGRAMADO",
      criadoEm: serverTimestamp()
    });

    alert("Carga criada com sucesso!");
    document.querySelectorAll(".form-grid input").forEach(i=>i.value="");

  }catch(error){
    console.error(error);
    alert("Erro ao salvar carga.");
  }

  resetBtn();

});

function resetBtn(){
  btnSalvar.disabled = false;
  textoBtn.innerText = "Salvar Carga";
  loaderBtn.classList.add("hidden");
}

/* 📊 RENDERIZAR TABELA */
function carregarCargas(){

  onSnapshot(collection(db,"programacao_cargas"), snapshot=>{

    tabela.innerHTML="";

    snapshot.forEach(docSnap=>{
      const c = docSnap.data();

      tabela.innerHTML+=`
        <tr>
          <td>${c.dataCarregamento?.toDate().toLocaleDateString()}</td>
          <td>${c.cliente}</td>
          <td>${c.municipio}</td>
          <td>${c.placa}</td>
          <td>${c.motorista}</td>
          <td>${c.volume}</td>
          <td><span class="status ${c.status}">${c.status}</span></td>
        </tr>
      `;
    });

  });

}

</script>

</body>
</html>

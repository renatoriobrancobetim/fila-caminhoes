<style>
:root{
  --azul:#0A3D91;
  --vermelho:#dc2626;
  --cinza:#f1f5f9;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--cinza);
}

header{
  background:linear-gradient(90deg,var(--azul),var(--vermelho));
  color:#fff;
  padding:12px 20px;   /* 👈 reduz altura */
  text-align:center;
}

header h1{
  margin:0;
  font-size:20px;      /* 👈 menor */
  font-weight:600;
}

header p{
  margin:4px 0 0 0;
  font-size:12px;      /* 👈 mais compacto */
  opacity:.9;
}

main{
  padding:40px;
  max-width:1300px;
  margin:auto;
}

/* CARD FORM */
.card-form{
  background:#fff;
  padding:25px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.linha-topo,.linha-bottom{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
  margin-bottom:15px;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.info-veiculo{
  background:#f1f5f9;
  padding:12px;
  border-radius:10px;
  font-weight:600;
  margin-bottom:15px;
  display:none;
}

.compartimento{
  background:#f8fafc;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:grid;
  grid-template-columns:120px 1fr 1fr 1fr;
  gap:10px;
}

.capacidade{
  font-weight:700;
  color:var(--azul);
}

/* BOTÕES */
.btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-azul{ background:var(--azul); color:#fff; }
.btn-vincular{ background:#198754; color:#fff; }
.btn-excluir{ background:#dc2626; color:#fff; }
.btn-warning{ background:#f59e0b; color:#fff; }

/* LOADER */
.loader{
  width:16px;
  height:16px;
  border:3px solid rgba(255,255,255,0.4);
  border-top:3px solid #fff;
  border-radius:50%;
  display:inline-block;
  margin-left:8px;
  animation:spin .7s linear infinite;
}

.hidden{ display:none !important; }

@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

/* TABELA */
.table-wrap{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  margin-top:30px;
}

table{
  width:100%;
  border-collapse:collapse;
}

thead tr{
  background:var(--azul);
}

th{
  color:#fff;
  padding:16px;
  text-align:center;
}

td{
  padding:14px;
  border-bottom:1px solid #f1f5f9;
  text-align:center;
}

/* STATUS BADGE */
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  letter-spacing:.5px;
  transition:all .3s ease;
}

.status-AGUARDANDO_FILA{
  background:#fef3c7;
  color:#92400e;
  border:1px solid #fde68a;
}

.status-PROGRAMADO{
  background:#dcfce7;
  color:#166534;
  border:1px solid #86efac;
}

/* TONALIDADE SUAVE NA LINHA */
.linha-status td{
  transition: background .25s ease;
}

.linha-status.status-AGUARDANDO_FILA td{
  background:#fffbeb;
}

.linha-status.status-PROGRAMADO td{
  background:#f0fdf4;
}

/* HOVER SUAVE */
.linha-status:hover td{
  background:#f8fafc;
}

/* COLUNA AÇÕES */
.col-acoes{
  display:flex;
  gap:8px;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  background:#fff;
  width:400px;
  max-width:90%;
  padding:25px;
  border-radius:14px;
}

.modal-actions{
  margin-top:20px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

/* DETALHE EXPANDIDO */
.detalhe-linha td{

}

.detalhe-container{

.detalhe-item{

.detalhe-item:nth-child(even){

.volume-destaque{

  .campo{

.campo label{

}
  input[type="text"]{

}
</style>

resumoHTML += "</div>";

window.toggleGrupo = function(id){
  const linhas = document.querySelectorAll(".grupo-" + id);

/* ===== AUTENTICAÇÃO + TABELA ===== */
function carregarTabela() {

onSnapshot(
  collection(db,"programacao_cargas"),
  snap => {

    tabela.innerHTML="";

    if (snap.empty) {
      tabela.innerHTML="<tr><td colspan='7'>Nenhuma carga encontrada</td></tr>";
      return;
    }

        const hoje = new Date();
    hoje.setHours(0,0,0,0);

let cargasHoje = [];
let cargasFuturas = [];
let cargasAntigas = [];
let cargasFaturadas = [];

    snap.forEach(docSnap=>{
      const c = docSnap.data();

      const dataCarga = c.dataCarregamento?.toDate 
        ? c.dataCarregamento.toDate()
        : new Date(c.dataCarregamento);

      dataCarga.setHours(0,0,0,0);

      const item = { id: docSnap.id, ...c, dataObj: dataCarga };

if(c.status === "FATURADO"){
  cargasFaturadas.push(item);
}
else if(dataCarga.getTime() === hoje.getTime()){
  cargasHoje.push(item);
}
else if(dataCarga.getTime() > hoje.getTime()){
  cargasFuturas.push(item);
}
else{
  // Data menor que hoje (1 dia ou mais atrás)
  cargasAntigas.push(item);
}

    });

    // Ordenar por data crescente
    cargasHoje.sort((a,b)=>a.dataObj - b.dataObj);
    cargasFuturas.sort((a,b)=>a.dataObj - b.dataObj);
    cargasFaturadas.sort((a,b)=>a.dataObj - b.dataObj);
    cargasAntigas.sort((a,b)=>a.dataObj - b.dataObj);

   function renderGrupo(titulo, lista, cor, grupoId){

</span>
        </td>

</button>

/* ===== MODAL ===== */
function abrirModal(titulo,conteudo,acao){
  document.getElementById("modalTitulo").innerText=titulo;
  document.getElementById("modalConteudo").innerHTML=conteudo;
  document.getElementById("btnConfirmarModal").onclick=acao;
  document.getElementById("modalOverlay").style.display="flex";
}

function fecharModal(){
  document.getElementById("modalOverlay").style.display="none";
}

function vincular(id){

  abrirModal(
    "Vincular Caminhão",
    `<input id="placaModal" placeholder="Digite a placa" style="width:100%;padding:8px;">`,
    async()=>{

      const placa = document.getElementById("placaModal").value.trim().toUpperCase();
      if(!placa) return;

      try{

        // 1️⃣ Buscar carga
        const cargaRef = doc(db,"programacao_cargas",id);
        const cargaSnap = await getDoc(cargaRef);

        if(!cargaSnap.exists()){
          fecharModal();
          return;
        }

        const carga = cargaSnap.data();

        // 2️⃣ Buscar caminhão
        const motoristaRef = doc(db,"motoristas_cadastro",placa);
        const motoristaSnap = await getDoc(motoristaRef);

        if(!motoristaSnap.exists()){
          abrirModal(
            "Caminhão não encontrado",
            `<p>Placa <strong>${placa}</strong> não está cadastrada no sistema.</p>`,
            ()=>{ fecharModal(); }
          );
          return;
        }

        const motorista = motoristaSnap.data();

        // 3️⃣ Extrair configuração numérica (ex: 5532)
        const configNumerica = motorista.configEixos.split("-")[0];

        // 4️⃣ Gerar compartimentos reais
        const compartimentosCaminhao = configNumerica
          .split("")
          .map(n => Number(n) * 1000);

        // 5️⃣ Calcular capacidade total
        const capacidadeCaminhao = compartimentosCaminhao
          .reduce((a,b)=>a+b,0);

        // ===== VALIDAÇÃO DE CAPACIDADE =====
        if (capacidadeCaminhao < carga.capacidadeTotal) {

          abrirModal(
            "Capacidade Insuficiente",
            `
            <p><strong>Carga:</strong> ${carga.capacidadeTotal.toLocaleString()} L</p>
            <p><strong>Caminhão:</strong> ${capacidadeCaminhao.toLocaleString()} L</p>
            <br>
            <p style="color:#b91c1c;font-weight:600;">
              O caminhão não possui capacidade suficiente.
            </p>
            `,
            ()=>{ fecharModal(); }
          );

          return;
        }

        // ===== VALIDAÇÃO DE DISTRIBUIÇÃO REAL =====
        function podeDistribuir(volumesCarga, compartimentos){

          let disponiveis = [...compartimentos];

          for(let volume of volumesCarga){

            let encaixou = false;

            for(let i=0; i<disponiveis.length; i++){

              if(disponiveis[i] >= volume){
                disponiveis[i] -= volume;
                encaixou = true;
                break;
              }

            }

            if(!encaixou) return false;
          }

          return true;
        }

        const volumesCarga = carga.compartimentos
          .filter(c => c.cliente)
          .map(c => c.capacidade);

        if(!podeDistribuir(volumesCarga, compartimentosCaminhao)){

          abrirModal(
            "Distribuição Incompatível",
            `
            <p>Os volumes da carga não encaixam</p>
            <p>nos compartimentos do caminhão.</p>
            <br>
            <p style="color:#b91c1c;font-weight:600;">
              Verifique a configuração de eixos.
            </p>
            `,
            ()=>{ fecharModal(); }
          );

          return;
        }

        // 6️⃣ Se passou em tudo
        await updateDoc(cargaRef,{
          placa:placa,
          status:"PROGRAMADO"
        });

        fecharModal();

      }catch(error){
        console.error(error);
        abrirModal(
          "Erro",
          "<p>Erro ao vincular caminhão.</p>",
          ()=>{ fecharModal(); }
        );
      }

    }
  );

}

function toggleDetalhe(id){

  const existente = document.getElementById("detalhe-"+id);
  if(existente){
    existente.remove();
    return;
  }

  const docRef = doc(db,"programacao_cargas",id);

  getDoc(docRef).then(docSnap=>{

    const c = docSnap.data();

    const linha = document.createElement("tr");
    linha.id="detalhe-"+id;
    linha.className="detalhe-linha";

    let itensHTML="";

    c.compartimentos.forEach(comp=>{
      if(comp.cliente || comp.municipio || comp.vendedor){

        itensHTML += `
          <div class="detalhe-item">
            <div>${comp.cliente || "-"}</div>
            <div>${comp.municipio || "-"}</div>
            <div class="volume-destaque">${comp.capacidade.toLocaleString()} L</div>
            <div>${comp.vendedor || "-"}</div>
          </div>
        `;
      }
    });

linha.innerHTML = `
  <td colspan="7">
    <div class="detalhe-container">

      <div class="detalhe-header">
        CÁLCULO DA CARGA – ${c.numeroCarga} • ${c.tipoCaminhao}
      </div>

      <div style="
        padding:10px 20px;
        background:#f1f5f9;
        font-size:13px;
        display:flex;
        justify-content:space-between;
        flex-wrap:wrap;
        gap:10px;
      ">
        <div><strong>Status:</strong> ${c.status}</div>
        <div>
          <strong>Placa:</strong> 
          ${c.placa ? c.placa : '<span style="color:#b91c1c;font-weight:600;">Aguardando Veículo</span>'}
        </div>
        <div><strong>Total:</strong> ${c.capacidadeTotal?.toLocaleString()} L</div>
      </div>

      <div class="detalhe-colunas">
        <div>Cliente</div>
        <div>Município</div>
        <div>Volume</div>
        <div>Vendedor</div>
      </div>

      ${itensHTML}

      ${c.observacoes ? `
        <div style="
          padding:15px 20px;
          background:#fff7ed;
          border-top:1px solid #e5e7eb;
          font-size:13px;
        ">
          <strong>Observações:</strong><br>
          ${c.observacoes}
        </div>
      ` : ""}

    </div>
  </td>
`;

    const linhasTabela = [...tabela.querySelectorAll("tr")];
    const linhaPrincipal = linhasTabela.find(tr => tr.innerHTML.includes(id));
    linhaPrincipal.after(linha);

  });

}

  async function alterarCarga(id){

  const cargaRef = doc(db,"programacao_cargas",id);
  const cargaSnap = await getDoc(cargaRef);

  if(!cargaSnap.exists()) return;

  const carga = cargaSnap.data();

  let html = `
    <div style="text-align:left;font-size:14px;">
      <p><strong>Nº:</strong> ${carga.numeroCarga}</p>
      <p><strong>Tipo:</strong> ${carga.tipoCaminhao}</p>
      <hr style="margin:10px 0;">
  `;

  carga.compartimentos.forEach((comp,index)=>{
    html += `
      <div style="margin-bottom:12px;padding:8px;background:#f8fafc;border-radius:8px;">
        <strong>${comp.capacidade.toLocaleString()} L</strong><br>
        <input id="cliente_${index}" value="${comp.cliente || ""}" 
          style="width:100%;margin-top:4px;text-transform:uppercase;">
        <input id="municipio_${index}" value="${comp.municipio || ""}" 
          style="width:100%;margin-top:4px;text-transform:uppercase;">
        <input id="vendedor_${index}" value="${comp.vendedor || ""}" 
          style="width:100%;margin-top:4px;text-transform:uppercase;">
      </div>
    `;
  });

  html += `
    <hr>
    <label>Observações</label>
    <input id="obs_edit" value="${carga.observacoes || ""}" 
      style="width:100%;margin-top:4px;text-transform:uppercase;">
    </div>
  `;

  abrirModal(
    "Alterar Carga",
    html,
    async ()=>{

      let novosCompartimentos = carga.compartimentos.map((comp,index)=>({
        capacidade: comp.capacidade,
        cliente: document.getElementById(`cliente_${index}`).value.trim().toUpperCase(),
        municipio: document.getElementById(`municipio_${index}`).value.trim().toUpperCase(),
        vendedor: document.getElementById(`vendedor_${index}`).value.trim().toUpperCase()
      }));

      await updateDoc(cargaRef,{
        compartimentos: novosCompartimentos,
        observacoes: document.getElementById("obs_edit").value.trim().toUpperCase()
      });

      fecharModal();
    }
  );
}

window.alterarCarga = alterarCarga;

async function confirmarSalvarCarga(){

  const dados = window._dadosTempCarga;
  fecharModal();

  try{

    // 🔥 AGORA SIM SALVA NO FIRESTORE
    await addDoc(collection(db,"programacao_cargas"),{
      numeroCarga: dados.numeroCarga,
      dataCarregamento:new Date(dados.dataInput + "T12:00:00"),
      dataReferencia: dados.dataInput,
      horarioPrevisto:document.getElementById("horarioPrevisto").value,
      tipoCaminhao:tipoCaminhaoAtual,
      configEixos: document.getElementById("tipoVeiculo").value.split("|")[1],
      capacidadeTotal:capacidadeTotalAtual,
      placa:null,
      status:"AGUARDANDO_FILA",
      compartimentos:dados.compartimentos,
      observacoes: document.getElementById("observacoes").value.toUpperCase(),
      criadoEm:serverTimestamp()
    });

    abrirModal(
      "Carga Criada com Sucesso",
      `
      <div style="text-align:left;font-size:14px;">
        <p style="font-size:16px;font-weight:700;">
          Nº da Carga: ${dados.numeroCarga}
        </p>
        <hr style="margin:10px 0;">
        ${dados.resumoHTML}
      </div>
      `,
      ()=>{ fecharModal(); }
    );

    // 🔄 LIMPAR FORMULÁRIO
    document.getElementById("observacoes").value = "";
    document.getElementById("km").value = "";
    document.getElementById("horarioPrevisto").value = "";
    document.getElementById("tipoVeiculo").value = "";
    container.innerHTML = "";
    infoVeiculo.style.display = "none";

    // 🔄 Resetar data para hoje novamente
    const hoje = new Date();
    const yyyy = hoje.getFullYear();
    const mm = String(hoje.getMonth() + 1).padStart(2, '0');
    const dd = String(hoje.getDate()).padStart(2, '0');
    document.getElementById("dataCarregamento").value = `${yyyy}-${mm}-${dd}`;

  }catch(error){
    console.error(error);
    abrirModal(
      "Erro",
      "<p>Erro ao salvar carga.</p>",
      ()=>{ fecharModal(); }
    );
  }

  // 🔥 RESET BOTÃO SEM LOOP
  btnSalvar.disabled = false;
  loaderBtn.classList.add("hidden");
  textoBtn.innerText = "Salvar Carga";
}

window.confirmarSalvarCarga = confirmarSalvarCarga;

window.faturarCarga = faturarCarga;

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" href="favicon.png">
<meta charset="UTF-8">
<title>Administração de Usuários | ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
margin:0;
background:#0f172a;
color:#fff;
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#0b1633;
padding:25px;
display:flex;
flex-direction:column;
gap:12px;
border-right:1px solid rgba(255,255,255,.05);
}

.sidebar h2{
margin:0 0 20px 0;
font-size:18px;
}

.sidebar a{
color:#cbd5f5;
text-decoration:none;
padding:10px;
border-radius:8px;
transition:.2s;
}

.sidebar a:hover{
background:rgba(255,255,255,.05);
}

/* MAIN */
.main{
flex:1;
padding:40px;
display:grid;
grid-template-columns: 420px 1fr;
gap:40px;
}

/* CARD */
.card{
background:#0b1633;
padding:25px;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,.4);
}

/* FORM */
input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #1e293b;
background:#020617;
color:#fff;
margin-bottom:12px;
}

.checkbox-group{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
font-size:14px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#1e3a8a,#dc2626);
color:#fff;
cursor:pointer;
width:100%;
font-weight:600;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

button:disabled{opacity:.6}

.msg{margin-top:10px;font-size:14px;text-align:center}
.msg.success{color:#4ade80}
.msg.error{color:#f87171}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:left;
font-size:14px;
}

th{background:#1e293b}

tr{
border-bottom:1px solid rgba(255,255,255,.05);
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.ativo{background:#16a34a}
.inativo{background:#dc2626}

/* MODAL */
.modal-bg{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.modal{
background:#0b1633;
padding:25px;
width:400px;
border-radius:12px;
}

.spinner{
width:16px;
height:16px;
border:3px solid rgba(255,255,255,.3);
border-top:3px solid #fff;
border-radius:50%;
animation:spin .7s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>
<body data-nivel="4">
<div class="sidebar">
<h2>ERP Logístico</h2>
<a href="painel.html">Painel</a>
<a href="usuarios-admin.html">Usuários</a>
</div>

<div class="main">

<!-- CADASTRO -->
<div class="card">
<h3>Novo Usuário</h3>

<input type="text" id="nome" placeholder="Nome completo">
<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">
<input type="password" id="confirmarSenha" placeholder="Confirmar senha">

<select id="nivel">
<option value="1">Nível 1</option>
<option value="2">Nível 2</option>
<option value="3">Nível 3</option>
<option value="4">Nível 4 - Master</option>
</select>

<h4 style="margin-top:20px;">Permissões</h4>

<div style="display:grid;grid-template-columns:20px 1fr;gap:8px 12px;margin-bottom:15px;align-items:center;">

<input type="checkbox" id="menuPainel">
<label for="menuPainel">Painel Operacional / Fila</label>

<input type="checkbox" id="menuFrete">
<label for="menuFrete">Cálculo de Frete</label>

<input type="checkbox" id="menuUsuarios">
<label for="menuUsuarios">Controle de Usuários</label>

<input type="checkbox" id="menuProgramacao">
<label for="menuProgramacao">Programação de Cargas</label>

</div>

<button id="btnCriar" onclick="criarUsuario()">Criar Usuário</button>
<div class="msg" id="msg"></div>

</div>

<!-- LISTA -->
<div class="card">
<h3>Usuários Cadastrados</h3>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Nível</th>
<th>Status</th>
<th></th>
</tr>
</thead>
<tbody id="listaUsuarios"></tbody>
</table>

</div>

</div>

<!-- MODAL EDIÇÃO -->
<div class="modal-bg" id="modalEditar">
<div class="modal">
<h3>Editar Usuário</h3>
<input type="text" id="editNome">
<select id="editNivel">
<option value="1">Nível 1</option>
<option value="2">Nível 2</option>
<option value="3">Nível 3</option>
<option value="4">Nível 4</option>
</select>
<select id="editAtivo">
<option value="true">Ativo</option>
<option value="false">Inativo</option>
</select>
<br>
<button onclick="salvarEdicao()">Salvar</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  doc, 
  updateDoc,
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCKdfOvWehaJcuK6uX5JXxc7YdN26h8sXY",
authDomain:"tabela-frete-rio-branco.firebaseapp.com",
projectId:"tabela-frete-rio-branco"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let editId=null;

onAuthStateChanged(auth, async (user) => {

  if(!user){
    window.location = "login.html";
    return;
  }

  // 🔥 FORÇA ATUALIZAÇÃO DO TOKEN
  await user.getIdToken(true);

});

// 🔥 LISTAGEM EM TEMPO REAL
const listaUsuarios = document.getElementById("listaUsuarios");

onSnapshot(collection(db,"usuarios"), (snapshot) => {

  listaUsuarios.innerHTML = "";

  if(snapshot.empty){
    listaUsuarios.innerHTML = `
      <tr>
        <td colspan="5" style="text-align:center;color:#94a3b8;">
          Nenhum usuário cadastrado.
        </td>
      </tr>
    `;
    return;
  }

  snapshot.forEach(docSnap => {

    const u = docSnap.data();

    listaUsuarios.innerHTML += `
      <tr>
        <td>${u.nome || "-"}</td>
        <td>${u.email || "-"}</td>
        <td>${u.nivel || "-"}</td>
        <td>
          <span class="badge ${u.ativo ? 'ativo':'inativo'}">
            ${u.ativo ? 'Ativo':'Inativo'}
          </span>
        </td>
        <td>
          <button onclick="abrirEditar('${docSnap.id}','${u.nome}',${u.nivel},${u.ativo})">
            Editar
          </button>
        </td>
      </tr>
    `;

  });

}, (error) => {
  console.error("Erro tempo real:", error);
});

window.abrirEditar=(id,nome,nivel,ativo)=>{
editId=id;
modalEditar.style.display="flex";
editNome.value=nome;
editNivel.value=nivel;
editAtivo.value=ativo;
}

window.salvarEdicao=async()=>{
await updateDoc(doc(db,"usuarios",editId),{
nome:editNome.value,
nivel:parseInt(editNivel.value),
ativo:editAtivo.value==="true"
});
modalEditar.style.display="none";

}

window.criarUsuario=async function(){

const btn=btnCriar;
btn.disabled=true;
btn.innerHTML='<div class="spinner"></div> Criando...';

try{
const nome=nome.value.trim();
const email=email.value.trim();
const senha=senha.value.trim();
const nivel=parseInt(nivel.value);

const idToken=await auth.currentUser.getIdToken();

const response=await fetch("https://criar-usuario-com-nivel-765019849831.us-central1.run.app",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+idToken
},
body:JSON.stringify({nome,email,senha,nivel})
});

const text=await response.text();
if(!response.ok)throw new Error(text);

msg.innerText="Usuário criado com sucesso.";
msg.className="msg success";


}catch(e){
msg.innerText=e.message;
msg.className="msg error";
}

btn.disabled=false;
btn.innerHTML="Criar Usuário";
}

</script>

</body>
</html>
